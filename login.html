<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuKiBooks — Biblioteca Escolar</title>
  <link rel="icon" href="https://www.mep.go.cr/favicon.ico" id="dynFavicon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ─────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #00071A;
      -webkit-font-smoothing: antialiased;
    }
    body.ready { overflow-y: auto; }

    /* ─────────────────────────────────────────────
       CANVAS — siempre visible, detrás de todo
    ───────────────────────────────────────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       SPLASH
    ───────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      will-change: opacity, filter;
      transition: opacity .7s cubic-bezier(.4,0,.2,1),
                  filter   .7s cubic-bezier(.4,0,.2,1);
    }
    #splash.exit {
      opacity: 0;
      filter: blur(12px);
      pointer-events: none;
    }

    /* Mascot wrapper – bob animation (delay = after reveal) */
    #spMascotWrap {
      position: relative;
      width: 164px;
      height: 164px;
      opacity: 0;
      transform: scale(.5) translateY(20px);
      will-change: opacity, transform;
      transition: opacity .9s cubic-bezier(.22,1,.36,1),
                  transform .9s cubic-bezier(.22,1,.36,1);
    }
    #spMascotWrap.reveal { opacity: 1; transform: scale(1) translateY(0); }

    /* Bob applied to inner element to avoid conflict */
    .sp-bob {
      position: relative;
      width: 100%; height: 100%;
      animation: bob 4.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    /* Pulsing glow behind mascot */
    .sp-glow {
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,140,255,.22) 0%, transparent 68%);
      animation: glow-pulse 3.2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { transform: scale(1);   opacity: .55; }
      50%      { transform: scale(1.25); opacity: 1; }
    }

    /* Mascot circle */
    .sp-circle {
      position: relative;
      z-index: 1;
      width: 164px; height: 164px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.13);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,80,200,.12);
    }
    .sp-circle img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Orbital ring */
    .sp-orbit {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.07);
      animation: orbit 9s linear infinite;
    }
    @keyframes orbit { to { transform: rotate(360deg); } }

    /* Orbital dots */
    .sp-dot {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
    }
    .sp-dot-1 {
      width: 9px; height: 9px;
      background: #FF9940;
      box-shadow: 0 0 10px #FF9940, 0 0 20px rgba(255,100,0,.4);
      margin: -4px;
      animation: orbit-dot-1 9s linear infinite;
    }
    .sp-dot-2 {
      width: 7px; height: 7px;
      background: #00CCFF;
      box-shadow: 0 0 8px #00CCFF;
      margin: -3px;
      animation: orbit-dot-2 9s linear infinite;
    }
    .sp-dot-3 {
      width: 5px; height: 5px;
      background: #FFD700;
      box-shadow: 0 0 7px #FFD700;
      margin: -2px;
      animation: orbit-dot-3 9s linear infinite;
    }
    @keyframes orbit-dot-1 {
      from { transform: rotate(0deg)   translateX(100px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
    }
    @keyframes orbit-dot-2 {
      from { transform: rotate(120deg)  translateX(100px) rotate(-120deg); }
      to   { transform: rotate(480deg)  translateX(100px) rotate(-480deg); }
    }
    @keyframes orbit-dot-3 {
      from { transform: rotate(240deg)  translateX(100px) rotate(-240deg); }
      to   { transform: rotate(600deg)  translateX(100px) rotate(-600deg); }
    }

    /* Splash text blocks — shared reveal pattern */
    .sp-text {
      text-align: center;
      opacity: 0;
      transform: translateY(22px);
      will-change: opacity, transform;
      transition: opacity .75s cubic-bezier(.22,1,.36,1),
                  transform .75s cubic-bezier(.22,1,.36,1);
    }
    .sp-text.reveal { opacity: 1; transform: translateY(0); }

    .sp-title-main {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 0 80px rgba(0,100,255,.3);
    }
    .sp-title-main .or { color: #FF9940; }
    .sp-mep {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.3);
      text-transform: uppercase;
      letter-spacing: .18em;
    }
    .sp-tagline {
      font-size: 15px;
      color: rgba(255,255,255,.45);
      font-style: italic;
      max-width: 300px;
      line-height: 1.65;
    }

    /* Progress bar */
    .sp-prog {
      width: 140px; height: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .sp-prog.reveal { opacity: 1; }
    .sp-prog-fill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, #003DA5, #00AAFF 50%, #FF9940);
      transition: width .12s linear;
    }

    /* ─────────────────────────────────────────────
       LOGIN PAGE
    ───────────────────────────────────────────── */
    #loginPage {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
      transition: opacity .65s ease;
    }
    #loginPage.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Glass card */
    .lp-card {
      position: relative;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.055);
      backdrop-filter: blur(44px) saturate(1.6);
      -webkit-backdrop-filter: blur(44px) saturate(1.6);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      padding: 48px 42px;
      box-shadow:
        0 48px 120px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04),
        inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
      transform: translateY(28px);
      will-change: transform;
      transition: transform .75s cubic-bezier(.22,1,.36,1);
    }
    #loginPage.show .lp-card { transform: translateY(0); }

    /* Inner glow blobs (decorative) */
    .lp-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(40px);
    }
    .lp-blob-1 {
      width: 260px; height: 260px;
      top: -100px; left: -80px;
      background: radial-gradient(circle, rgba(0,70,200,.14), transparent 70%);
    }
    .lp-blob-2 {
      width: 200px; height: 200px;
      bottom: -80px; right: -60px;
      background: radial-gradient(circle, rgba(255,80,0,.08), transparent 70%);
    }

    /* Card content above blobs */
    .lp-inner { position: relative; z-index: 1; }

    /* Logo */
    .lp-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .lp-logo-box {
      display: inline-block;
      width: 76px; height: 76px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.13);
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 0 44px rgba(0,100,255,.13);
      transition: box-shadow .35s;
    }
    .lp-logo-box:hover {
      box-shadow: 0 0 64px rgba(0,160,255,.22);
    }
    .lp-logo-box img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .lp-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }
    .lp-brand .or { color: #FF9940; }
    .lp-brand-sub {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.28);
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    /* Heading */
    .lp-heading { margin-bottom: 26px; }
    .lp-heading-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .lp-heading-sub {
      font-size: 13px;
      color: rgba(255,255,255,.38);
    }

    /* Error box */
    .lp-err {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,60,60,.1);
      border: 1px solid rgba(255,80,80,.22);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,160,160,.95);
      animation: err-in .3s cubic-bezier(.22,1,.36,1);
    }
    .lp-err.show { display: block; }
    @keyframes err-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Field group */
    .fg { margin-bottom: 18px; }
    .fl {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
      margin-bottom: 8px;
    }
    .fi-wrap { position: relative; }

    /* Input */
    .fi {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 46px 14px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: #fff;
      outline: none;
      will-change: border-color, box-shadow;
      transition: background .25s, border-color .25s, box-shadow .25s;
    }
    .fi::placeholder { color: rgba(255,255,255,.2); }
    .fi:focus {
      background: rgba(255,255,255,.09);
      border-color: rgba(0,180,255,.6);
      box-shadow: 0 0 0 3px rgba(0,160,255,.12),
                  0 0 28px rgba(0,120,255,.07);
    }
    /* Shake on error — added/removed by JS */
    .fi.shake {
      border-color: rgba(255,80,80,.65);
      animation: shake .45s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%,54%  { transform: translateX(-8px); }
      36%,72%  { transform: translateX(8px); }
    }

    /* Input icon */
    .fi-ico {
      position: absolute;
      right: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: .3;
      pointer-events: none;
    }
    /* Toggle password button */
    .fi-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: rgba(255,255,255,.35);
      padding: 5px;
      line-height: 1;
      transition: color .2s;
    }
    .fi-toggle:hover { color: rgba(255,255,255,.7); }

    /* Submit button */
    .btn-login {
      width: 100%;
      margin-top: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #003DA5 0%, #1558CC 50%, #003DA5 100%);
      background-size: 200% 100%;
      will-change: background-position, box-shadow, transform;
      transition:
        background-position .45s ease,
        box-shadow .3s ease,
        transform .15s ease;
    }
    /* Shimmer layer */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,.18) 45%,
        rgba(255,255,255,.22) 50%,
        rgba(255,255,255,.18) 55%,
        transparent 100%);
      transform: translateX(-110%) skewX(-20deg);
      transition: transform 0s;
    }
    .btn-login:hover:not(:disabled) {
      background-position: 100% 0;
      box-shadow: 0 14px 40px rgba(0,61,165,.45),
                  0 4px 12px rgba(0,80,200,.28);
      transform: translateY(-1px);
    }
    .btn-login:hover:not(:disabled)::before {
      animation: shimmer .6s ease-in-out forwards;
    }
    @keyframes shimmer {
      to { transform: translateX(140%) skewX(-20deg); }
    }
    .btn-login:active:not(:disabled) {
      transform: scale(.985);
      box-shadow: 0 4px 16px rgba(0,61,165,.3);
    }
    .btn-login:disabled { opacity: .68; cursor: not-allowed; }
    .btn-login.success {
      background: linear-gradient(135deg, #0A6640, #1B8050) !important;
      background-position: 0 0 !important;
      box-shadow: 0 14px 40px rgba(10,102,64,.4) !important;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .lp-footer {
      margin-top: 26px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,.17);
      letter-spacing: .05em;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .lp-card { padding: 36px 24px; border-radius: 22px; }
      .sp-title-main { font-size: 42px; }
      .lp-heading-title { font-size: 24px; }
    }

  </style>
</head>
<body>

<!-- ── Canvas (fondo siempre vivo) ── -->
<canvas id="bgCanvas"></canvas>

<!-- ══════════════════════════════════════════════════
     SPLASH
══════════════════════════════════════════════════ -->
<div id="splash">

  <!-- Mascota -->
  <div id="spMascotWrap">
    <div class="sp-bob" id="spBob">
      <div class="sp-glow"></div>
      <div class="sp-orbit">
        <div class="sp-dot sp-dot-1"></div>
        <div class="sp-dot sp-dot-2"></div>
        <div class="sp-dot sp-dot-3"></div>
      </div>
      <div class="sp-circle" id="spCircle">
        <img src="img/logo.png" alt="LuKiBooks"
             onerror="this.style.display='none';this.parentElement.innerHTML+='<span style=font-size:68px>📚</span>'">
      </div>
    </div>
  </div>

  <!-- Título -->
  <div class="sp-text" id="spTitle">
    <div class="sp-title-main">Luki<span class="or">Books</span></div>
    <div class="sp-mep">Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica</div>
  </div>

  <!-- Tagline -->
  <div class="sp-text sp-tagline" id="spTagline">
    Donde cada libro abre un mundo de posibilidades
  </div>

  <!-- Progreso -->
  <div class="sp-prog" id="spProg">
    <div class="sp-prog-fill" id="spFill"></div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="lp-card">
    <div class="lp-blob lp-blob-1"></div>
    <div class="lp-blob lp-blob-2"></div>

    <div class="lp-inner">

      <!-- Logo -->
      <div class="lp-logo">
        <div class="lp-logo-box" id="lpLogoBox">
          <img src="img/logo.png" alt="LuKiBooks"
               onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:30px>📚</span>'">
        </div>
        <div class="lp-brand">Luki<span class="or">Books</span></div>
        <div class="lp-brand-sub">Biblioteca Escolar &middot; MEP</div>
      </div>

      <!-- Encabezado -->
      <div class="lp-heading">
        <div class="lp-heading-title">Bienvenido</div>
        <div class="lp-heading-sub">Ingrese sus credenciales para acceder</div>
      </div>

      <!-- Error -->
      <div class="lp-err" id="errBox" role="alert"></div>

      <!-- Formulario -->
      <form id="loginForm" novalidate>
        <div class="fg">
          <label class="fl" for="inputUser">Usuario</label>
          <div class="fi-wrap">
            <input class="fi" type="text" id="inputUser"
                   placeholder="Ingrese su usuario"
                   autocomplete="username" required>
            <span class="fi-ico" aria-hidden="true">&#128100;</span>
          </div>
        </div>
        <div class="fg">
          <label class="fl" for="inputPass">Contrase&ntilde;a</label>
          <div class="fi-wrap">
            <input class="fi" type="password" id="inputPass"
                   placeholder="Ingrese su contrase&ntilde;a"
                   autocomplete="current-password" required>
            <button type="button" class="fi-toggle" id="togglePass"
                    aria-label="Mostrar contrase&ntilde;a">&#128065;</button>
          </div>
        </div>
        <button class="btn-login" type="submit" id="btnLogin">
          Iniciar sesi&oacute;n
        </button>
      </form>

      <div class="lp-footer">
        LuKiBooks v3.0 &mdash; Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica
      </div>

    </div>
  </div>
</div>

<script>
/* ================================================================
   LuKiBooks — Splash + Login
   Single-file, zero dependencies, 60fps
================================================================ */
(function () {
  'use strict';

  /* ── Config ── */
  var isLocal = location.hostname === 'localhost'
             || location.hostname === '127.0.0.1';
  var BASE = isLocal
    ? 'http://localhost:3000/api'
    : 'https://biblioapp-nclh.onrender.com/api';

  /* Redirect si ya hay sesión */
  if (localStorage.getItem('biblio_token')) {
    location.href = 'index.html';
    return;
  }

  /* ────────────────────────────────────────────────────────────
     CANVAS — Fondo animado con orbs y partículas
     requestAnimationFrame loop, todo en GPU (transform/opacity)
  ──────────────────────────────────────────────────────────── */
  var canvas = document.getElementById('bgCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H;
  var mouseX = 0, mouseY = 0;
  var mouseTargetX = 0, mouseTargetY = 0;

  function resizeCanvas() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    mouseX = mouseTargetX = W * .5;
    mouseY = mouseTargetY = H * .5;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  document.addEventListener('mousemove', function (e) {
    mouseTargetX = e.clientX;
    mouseTargetY = e.clientY;
  });

  /* Ambient orbs — each reacts to mouse (parallax) */
  var ORBS = [
    { bx: .12, by: .18, r: 300, rgb: [0,  70, 210], a: .12, px: .016, py: .014, phase: 0,   spd: .00035 },
    { bx: .88, by: .12, r: 240, rgb: [0, 150, 255], a: .08, px: .011, py: .009, phase: 1.8, spd: .00028 },
    { bx: .78, by: .82, r: 280, rgb: [0,  40, 170], a: .10, px: .014, py: .012, phase: 3.2, spd: .00042 },
    { bx: .18, by: .78, r: 220, rgb: [220, 70,  0], a: .05, px: .009, py: .008, phase: 5.1, spd: .00032 },
    { bx: .50, by: .50, r: 360, rgb: [0,  25, 110], a: .07, px: .007, py: .006, phase: 2.6, spd: .00024 },
  ];

  /* Sparkles — tiny twinkling dots */
  var SPARKLES = (function () {
    var arr = [];
    var COLORS = [
      [255, 255, 255],
      [160, 210, 255],
      [255, 160,  80],
    ];
    for (var i = 0; i < 60; i++) {
      arr.push({
        x:    Math.random(),       /* 0-1 relative */
        y:    Math.random(),
        s:    Math.random() * 1.4 + .4,
        peak: Math.random() * .6 + .2,
        phase: Math.random() * Math.PI * 2,
        spd:  Math.random() * .0055 + .002,
        rgb:  COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }
    return arr;
  })();

  /* Main draw loop */
  var t0 = performance.now();

  function frame(now) {
    var t = (now - t0) * .001; /* seconds */

    /* Lerp mouse for smooth parallax */
    mouseX += (mouseTargetX - mouseX) * .04;
    mouseY += (mouseTargetY - mouseY) * .04;

    var mx = (mouseX / W - .5); /* -0.5 → 0.5 */
    var my = (mouseY / H - .5);

    ctx.clearRect(0, 0, W, H);

    /* Base fill */
    ctx.fillStyle = '#00071A';
    ctx.fillRect(0, 0, W, H);

    /* Ambient orbs */
    ORBS.forEach(function (o) {
      var pulse = Math.sin(t * o.spd * 1000 + o.phase) * .1;
      var r  = o.r * (1 + pulse);
      var ox = o.bx * W - mx * W * o.px;
      var oy = o.by * H - my * H * o.py;
      var al = o.a + pulse * .025;

      var g = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
      g.addColorStop(0, 'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + al + ')');
      g.addColorStop(1, 'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',0)');

      ctx.beginPath();
      ctx.arc(ox, oy, r, 0, 6.2832);
      ctx.fillStyle = g;
      ctx.fill();
    });

    /* Sparkles */
    SPARKLES.forEach(function (s) {
      var alpha = s.peak * (Math.sin(t * s.spd * 1000 + s.phase) * .5 + .5);
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.s, 0, 6.2832);
      ctx.fillStyle = 'rgba(' + s.rgb[0] + ',' + s.rgb[1] + ',' + s.rgb[2] + ',' + alpha + ')';
      ctx.fill();
    });

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ────────────────────────────────────────────────────────────
     SPLASH — secuencia de aparición por capas con micro-delays
  ──────────────────────────────────────────────────────────── */
  function reveal(id, delay) {
    setTimeout(function () {
      var el = document.getElementById(id);
      if (el) el.classList.add('reveal');
    }, delay);
  }

  reveal('spMascotWrap', 280);
  reveal('spTitle',      820);
  reveal('spTagline',   1180);
  reveal('spProg',      1420);

  /* Progress bar — rAF para suavidad real */
  var progStart = null;
  var PROG_DUR  = 2500; /* ms de duración del fill */

  setTimeout(function () {
    var fill = document.getElementById('spFill');
    function progFrame(now) {
      if (!progStart) progStart = now;
      var pct = Math.min((now - progStart) / PROG_DUR * 100, 100);
      /* Easing cuadrático para sensación de carga real */
      var eased = pct < 70 ? pct * .95 : 70 + (pct - 70) * 1.4;
      if (fill) fill.style.width = Math.min(eased, 100) + '%';
      if (pct < 100) requestAnimationFrame(progFrame);
    }
    requestAnimationFrame(progFrame);
  }, 1420);

  /* ────────────────────────────────────────────────────────────
     TRANSICIÓN SPLASH → LOGIN
     Fade + blur out / fade + slide in
  ──────────────────────────────────────────────────────────── */
  var transitioned = false;

  function doTransition() {
    if (transitioned) return;
    transitioned = true;

    var splash = document.getElementById('splash');
    var login  = document.getElementById('loginPage');

    /* 1. Splash exit */
    splash.classList.add('exit');

    /* 2. Login aparece con ligero delay para que se sienta como crossfade */
    setTimeout(function () {
      login.classList.add('show');
    }, 100);

    /* 3. Eliminar splash del DOM para liberar memoria */
    setTimeout(function () {
      if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      document.body.classList.add('ready');
    }, 850);
  }

  /* Trigger: 3.2s o cuando la página ya cargó completamente */
  var SPLASH_DURATION = 3200;
  var splashTimer = setTimeout(doTransition, SPLASH_DURATION);

  window.addEventListener('load', function () {
    /* Si la página carga muy rápido, esperar mínimo 2.8s para que se vea el splash */
    var elapsed = performance.now() - t0;
    var remaining = Math.max(2800 - elapsed, 0);
    clearTimeout(splashTimer);
    splashTimer = setTimeout(doTransition, remaining);
  });

  /* ────────────────────────────────────────────────────────────
     CONFIG DINÁMICA — logo y favicon desde API
  ──────────────────────────────────────────────────────────── */
  fetch(BASE + '/config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      if (!cfg) return;

      if (cfg.logo) {
        var img = '<img style="width:100%;height:100%;object-fit:contain" src="' + cfg.logo + '" alt="Logo">';
        var box = document.getElementById('lpLogoBox');
        var sp  = document.getElementById('spCircle');
        if (box) box.innerHTML = img;
        if (sp)  sp.innerHTML  = img;
      }

      if (cfg.favicon) {
        var fav = document.getElementById('dynFavicon');
        if (fav) fav.href = cfg.favicon;
      }
    })
    .catch(function () { /* logo local se mantiene */ });

  /* ────────────────────────────────────────────────────────────
     TOGGLE CONTRASEÑA
  ──────────────────────────────────────────────────────────── */
  var toggleBtn  = document.getElementById('togglePass');
  var passInput  = document.getElementById('inputPass');
  var passShown  = false;

  toggleBtn.addEventListener('click', function () {
    passShown      = !passShown;
    passInput.type = passShown ? 'text' : 'password';
    toggleBtn.innerHTML = passShown ? '&#128584;' : '&#128065;';
    toggleBtn.setAttribute('aria-label',
      passShown ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  /* ────────────────────────────────────────────────────────────
     FORMULARIO DE LOGIN
  ──────────────────────────────────────────────────────────── */
  var form    = document.getElementById('loginForm');
  var errBox  = document.getElementById('errBox');
  var btnEl   = document.getElementById('btnLogin');
  var userInp = document.getElementById('inputUser');

  /* Limpiar error al escribir */
  [userInp, passInput].forEach(function (inp) {
    inp.addEventListener('input', function () {
      errBox.classList.remove('show');
      inp.classList.remove('shake');
    });
  });

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');

    /* Shake en ambos inputs: forzar reflow para reiniciar animación */
    [userInp, passInput].forEach(function (inp) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
    });
    setTimeout(function () {
      [userInp, passInput].forEach(function (i) { i.classList.remove('shake'); });
    }, 500);
  }

  function setLoading(on) {
    btnEl.disabled = on;
    btnEl.innerHTML = on
      ? '<span class="btn-spinner"></span>Verificando\u2026'
      : 'Iniciar sesi\u00F3n';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errBox.classList.remove('show');

    var usuario  = userInp.value.trim();
    var password = passInput.value;

    if (!usuario || !password) {
      showErr('Ingrese usuario y contraseña para continuar');
      return;
    }

    setLoading(true);

    fetch(BASE + '/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ usuario: usuario, password: password })
    })
    .then(function (res) {
      return res.json().then(function (d) { return { ok: res.ok, d: d }; });
    })
    .then(function (r) {
      if (!r.ok) {
        showErr(r.d.error || 'Credenciales incorrectas');
        setLoading(false);
        return;
      }
      /* Éxito */
      btnEl.innerHTML = '&#10003; Acceso concedido';
      btnEl.classList.add('success');
      btnEl.disabled  = true;
      localStorage.setItem('biblio_token', r.d.token);
      localStorage.setItem('biblio_user',  JSON.stringify(r.d.user));
      setTimeout(function () { location.href = 'index.html'; }, 680);
    })
    .catch(function () {
      showErr('Error de conexión. Verifique que el servidor esté activo.');
      setLoading(false);
    });
  });

})();
</script>
</body>
</html>
