<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuKiBooks — Biblioteca Escolar</title>
  <link rel="icon" href="https://www.mep.go.cr/favicon.ico" id="dynFavicon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ─────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #00071A;
      -webkit-font-smoothing: antialiased;
    }
    body.ready { overflow-y: auto; }

    /* ─────────────────────────────────────────────
       CANVAS — siempre visible, detrás de todo
    ───────────────────────────────────────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       SPLASH
    ───────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      will-change: opacity, filter;
      transition: opacity .7s cubic-bezier(.4,0,.2,1),
                  filter   .7s cubic-bezier(.4,0,.2,1);
    }
    #splash.exit {
      opacity: 0;
      filter: blur(12px);
      pointer-events: none;
    }

    /* Mascot wrapper – bob animation (delay = after reveal) */
    #spMascotWrap {
      position: relative;
      width: 164px;
      height: 164px;
      opacity: 0;
      transform: scale(.5) translateY(20px);
      will-change: opacity, transform;
      transition: opacity .9s cubic-bezier(.22,1,.36,1),
                  transform .9s cubic-bezier(.22,1,.36,1);
    }
    #spMascotWrap.reveal { opacity: 1; transform: scale(1) translateY(0); }

    /* Bob applied to inner element to avoid conflict */
    .sp-bob {
      position: relative;
      width: 100%; height: 100%;
      animation: bob 4.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    /* Pulsing glow behind mascot */
    .sp-glow {
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,140,255,.22) 0%, transparent 68%);
      animation: glow-pulse 3.2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { transform: scale(1);   opacity: .55; }
      50%      { transform: scale(1.25); opacity: 1; }
    }

    /* Mascot circle — sin fondo, imagen con screen blend */
    .sp-circle {
      position: relative;
      z-index: 1;
      width: 164px; height: 164px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sp-circle img {
      width: 148px; height: 148px;
      object-fit: contain;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 24px rgba(0,160,255,.5))
              drop-shadow(0 0 48px rgba(0,80,200,.25));
    }

    /* Orbital ring */
    .sp-orbit {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.07);
      animation: orbit 9s linear infinite;
    }
    @keyframes orbit { to { transform: rotate(360deg); } }

    /* Orbital dots */
    .sp-dot {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
    }
    .sp-dot-1 {
      width: 9px; height: 9px;
      background: #FF9940;
      box-shadow: 0 0 10px #FF9940, 0 0 20px rgba(255,100,0,.4);
      margin: -4px;
      animation: orbit-dot-1 9s linear infinite;
    }
    .sp-dot-2 {
      width: 7px; height: 7px;
      background: #00CCFF;
      box-shadow: 0 0 8px #00CCFF;
      margin: -3px;
      animation: orbit-dot-2 9s linear infinite;
    }
    .sp-dot-3 {
      width: 5px; height: 5px;
      background: #FFD700;
      box-shadow: 0 0 7px #FFD700;
      margin: -2px;
      animation: orbit-dot-3 9s linear infinite;
    }
    @keyframes orbit-dot-1 {
      from { transform: rotate(0deg)   translateX(100px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
    }
    @keyframes orbit-dot-2 {
      from { transform: rotate(120deg)  translateX(100px) rotate(-120deg); }
      to   { transform: rotate(480deg)  translateX(100px) rotate(-480deg); }
    }
    @keyframes orbit-dot-3 {
      from { transform: rotate(240deg)  translateX(100px) rotate(-240deg); }
      to   { transform: rotate(600deg)  translateX(100px) rotate(-600deg); }
    }

    /* Splash text blocks — shared reveal pattern */
    .sp-text {
      text-align: center;
      opacity: 0;
      transform: translateY(22px);
      will-change: opacity, transform;
      transition: opacity .75s cubic-bezier(.22,1,.36,1),
                  transform .75s cubic-bezier(.22,1,.36,1);
    }
    .sp-text.reveal { opacity: 1; transform: translateY(0); }

    .sp-title-main {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 0 80px rgba(0,100,255,.3);
    }
    .sp-title-main .or { color: #FF9940; }
    .sp-mep {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.3);
      text-transform: uppercase;
      letter-spacing: .18em;
    }
    .sp-tagline {
      font-size: 15px;
      color: rgba(255,255,255,.45);
      font-style: italic;
      max-width: 300px;
      line-height: 1.65;
    }

    /* Progress bar */
    .sp-prog {
      width: 140px; height: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .sp-prog.reveal { opacity: 1; }
    .sp-prog-fill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, #003DA5, #00AAFF 50%, #FF9940);
      transition: width .12s linear;
    }

    /* ─────────────────────────────────────────────
       LOGIN PAGE
    ───────────────────────────────────────────── */
    #loginPage {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
      transition: opacity .65s ease;
    }
    #loginPage.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Glass card */
    .lp-card {
      position: relative;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.055);
      backdrop-filter: blur(44px) saturate(1.6);
      -webkit-backdrop-filter: blur(44px) saturate(1.6);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      padding: 48px 42px;
      box-shadow:
        0 48px 120px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04),
        inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
      transform: translateY(28px);
      will-change: transform;
      transition: transform .75s cubic-bezier(.22,1,.36,1);
    }
    #loginPage.show .lp-card { transform: translateY(0); }

    /* Inner glow blobs (decorative) */
    .lp-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(40px);
    }
    .lp-blob-1 {
      width: 260px; height: 260px;
      top: -100px; left: -80px;
      background: radial-gradient(circle, rgba(0,70,200,.14), transparent 70%);
    }
    .lp-blob-2 {
      width: 200px; height: 200px;
      bottom: -80px; right: -60px;
      background: radial-gradient(circle, rgba(255,80,0,.08), transparent 70%);
    }

    /* Card content above blobs */
    .lp-inner { position: relative; z-index: 1; }

    /* Logo */
    .lp-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .lp-logo-box {
      display: inline-block;
      width: 88px; height: 88px;
      margin-bottom: 14px;
      position: relative;
    }
    .lp-logo-box img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 18px rgba(0,160,255,.45))
              drop-shadow(0 4px 12px rgba(0,0,0,.4));
      transition: filter .35s;
    }
    .lp-logo-box:hover img {
      filter: drop-shadow(0 0 28px rgba(0,200,255,.65))
              drop-shadow(0 4px 16px rgba(0,0,0,.45));
    }
    .lp-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }
    .lp-brand .or { color: #FF9940; }
    .lp-brand-sub {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.28);
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    /* Heading */
    .lp-heading { margin-bottom: 26px; }
    .lp-heading-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .lp-heading-sub {
      font-size: 13px;
      color: rgba(255,255,255,.38);
    }

    /* Error box */
    .lp-err {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,60,60,.1);
      border: 1px solid rgba(255,80,80,.22);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,160,160,.95);
      animation: err-in .3s cubic-bezier(.22,1,.36,1);
    }
    .lp-err.show { display: block; }
    @keyframes err-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Field group */
    .fg { margin-bottom: 18px; }
    .fl {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
      margin-bottom: 8px;
    }
    .fi-wrap { position: relative; }

    /* Input */
    .fi {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 46px 14px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: #fff;
      outline: none;
      will-change: border-color, box-shadow;
      transition: background .25s, border-color .25s, box-shadow .25s;
    }
    .fi::placeholder { color: rgba(255,255,255,.2); }
    .fi:focus {
      background: rgba(255,255,255,.09);
      border-color: rgba(0,180,255,.6);
      box-shadow: 0 0 0 3px rgba(0,160,255,.12),
                  0 0 28px rgba(0,120,255,.07);
    }
    /* Shake on error — added/removed by JS */
    .fi.shake {
      border-color: rgba(255,80,80,.65);
      animation: shake .45s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%,54%  { transform: translateX(-8px); }
      36%,72%  { transform: translateX(8px); }
    }

    /* Input icon */
    .fi-ico {
      position: absolute;
      right: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: .3;
      pointer-events: none;
    }
    /* Toggle password button */
    .fi-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: rgba(255,255,255,.35);
      padding: 5px;
      line-height: 1;
      transition: color .2s;
    }
    .fi-toggle:hover { color: rgba(255,255,255,.7); }

    /* Submit button */
    .btn-login {
      width: 100%;
      margin-top: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #003DA5 0%, #1558CC 50%, #003DA5 100%);
      background-size: 200% 100%;
      will-change: background-position, box-shadow, transform;
      transition:
        background-position .45s ease,
        box-shadow .3s ease,
        transform .15s ease;
    }
    /* Shimmer layer */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,.18) 45%,
        rgba(255,255,255,.22) 50%,
        rgba(255,255,255,.18) 55%,
        transparent 100%);
      transform: translateX(-110%) skewX(-20deg);
      transition: transform 0s;
    }
    .btn-login:hover:not(:disabled) {
      background-position: 100% 0;
      box-shadow: 0 14px 40px rgba(0,61,165,.45),
                  0 4px 12px rgba(0,80,200,.28);
      transform: translateY(-1px);
    }
    .btn-login:hover:not(:disabled)::before {
      animation: shimmer .6s ease-in-out forwards;
    }
    @keyframes shimmer {
      to { transform: translateX(140%) skewX(-20deg); }
    }
    .btn-login:active:not(:disabled) {
      transform: scale(.985);
      box-shadow: 0 4px 16px rgba(0,61,165,.3);
    }
    .btn-login:disabled { opacity: .68; cursor: not-allowed; }
    .btn-login.success {
      background: linear-gradient(135deg, #0A6640, #1B8050) !important;
      background-position: 0 0 !important;
      box-shadow: 0 14px 40px rgba(10,102,64,.4) !important;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .lp-footer {
      margin-top: 26px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,.17);
      letter-spacing: .05em;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .lp-card { padding: 36px 24px; border-radius: 22px; }
      .sp-title-main { font-size: 42px; }
      .lp-heading-title { font-size: 24px; }
    }

  </style>
</head>
<body>

<!-- ── Canvas (fondo siempre vivo) ── -->
<canvas id="bgCanvas"></canvas>

<!-- ══════════════════════════════════════════════════
     SPLASH
══════════════════════════════════════════════════ -->
<div id="splash">

  <!-- Mascota -->
  <div id="spMascotWrap">
    <div class="sp-bob" id="spBob">
      <div class="sp-glow"></div>
      <div class="sp-orbit">
        <div class="sp-dot sp-dot-1"></div>
        <div class="sp-dot sp-dot-2"></div>
        <div class="sp-dot sp-dot-3"></div>
      </div>
      <div class="sp-circle" id="spCircle">
        <img src="img/logo.png" alt="LuKiBooks"
             onerror="this.style.display='none';this.parentElement.innerHTML+='<span style=font-size:68px>📚</span>'">
      </div>
    </div>
  </div>

  <!-- Título -->
  <div class="sp-text" id="spTitle">
    <div class="sp-title-main">Luki<span class="or">Books</span></div>
    <div class="sp-mep">Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica</div>
  </div>

  <!-- Tagline -->
  <div class="sp-text sp-tagline" id="spTagline">
    Donde cada libro abre un mundo de posibilidades
  </div>

  <!-- Progreso -->
  <div class="sp-prog" id="spProg">
    <div class="sp-prog-fill" id="spFill"></div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="lp-card">
    <div class="lp-blob lp-blob-1"></div>
    <div class="lp-blob lp-blob-2"></div>

    <div class="lp-inner">

      <!-- Logo -->
      <div class="lp-logo">
        <div class="lp-logo-box" id="lpLogoBox">
          <img src="img/logo.png" alt="LuKiBooks"
               onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:30px>📚</span>'">
        </div>
        <div class="lp-brand">Luki<span class="or">Books</span></div>
        <div class="lp-brand-sub">Biblioteca Escolar &middot; MEP</div>
      </div>

      <!-- Encabezado -->
      <div class="lp-heading">
        <div class="lp-heading-title">Bienvenido</div>
        <div class="lp-heading-sub">Ingrese sus credenciales para acceder</div>
      </div>

      <!-- Error -->
      <div class="lp-err" id="errBox" role="alert"></div>

      <!-- Formulario -->
      <form id="loginForm" novalidate>
        <div class="fg">
          <label class="fl" for="inputUser">Usuario</label>
          <div class="fi-wrap">
            <input class="fi" type="text" id="inputUser"
                   placeholder="Ingrese su usuario"
                   autocomplete="username" required>
            <span class="fi-ico" aria-hidden="true">&#128100;</span>
          </div>
        </div>
        <div class="fg">
          <label class="fl" for="inputPass">Contrase&ntilde;a</label>
          <div class="fi-wrap">
            <input class="fi" type="password" id="inputPass"
                   placeholder="Ingrese su contrase&ntilde;a"
                   autocomplete="current-password" required>
            <button type="button" class="fi-toggle" id="togglePass"
                    aria-label="Mostrar contrase&ntilde;a">&#128065;</button>
          </div>
        </div>
        <button class="btn-login" type="submit" id="btnLogin">
          Iniciar sesi&oacute;n
        </button>
      </form>

      <div class="lp-footer">
        LuKiBooks v3.0 &mdash; Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica
      </div>

    </div>
  </div>
</div>

<script>
/* ================================================================
   LuKiBooks — Splash + Login
   Single-file, zero dependencies, 60fps
================================================================ */
(function () {
  'use strict';

  /* ── Config ── */
  var isLocal = location.hostname === 'localhost'
             || location.hostname === '127.0.0.1';
  var BASE = isLocal
    ? 'http://localhost:3000/api'
    : 'https://biblioapp-nclh.onrender.com/api';

  /* Redirect si ya hay sesión */
  if (localStorage.getItem('biblio_token')) {
    location.href = 'index.html';
    return;
  }

  /* ────────────────────────────────────────────────────────────
     CANVAS — Universo espacial realista: 60fps, parallax, nebulosas
  ──────────────────────────────────────────────────────────── */
  var canvas = document.getElementById('bgCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H, t0 = performance.now();
  var mouseX = 0, mouseY = 0, mTX = 0, mTY = 0;

  function resizeCanvas() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    mTX = mouseX = W * .5;
    mTY = mouseY = H * .5;
    buildStars(); /* reconstruir al resize */
  }

  document.addEventListener('mousemove', function (e) { mTX = e.clientX; mTY = e.clientY; });
  window.addEventListener('resize', resizeCanvas);

  /* ── Estrellas: 3 capas de profundidad (parallax real) ── */
  var STAR_LAYERS = [];

  function buildStars() {
    STAR_LAYERS = [
      /* Capa lejana: muchas, pequeñas, lentas */
      buildLayer(280, .15, 1.1,  .003),
      /* Capa media */
      buildLayer(130, .5,  1.8,  .008),
      /* Capa cercana: pocas, grandes, rápidas */
      buildLayer(40,  .9,  2.8,  .018),
    ];
  }

  function buildLayer(count, baseAlpha, maxSize, parallaxFactor) {
    var stars = [];
    for (var i = 0; i < count; i++) {
      var size = Math.random() * maxSize + .3;
      stars.push({
        x:    Math.random(),
        y:    Math.random(),
        size: size,
        alpha: baseAlpha * (.4 + Math.random() * .6),
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpd:   Math.random() * .0028 + .0008,
        /* Color: mayoría blancas, algunas azul-hielo, pocas cálidas */
        r: 255,
        g: Math.random() > .85 ? 200 + Math.floor(Math.random()*55) : 255,
        b: Math.random() > .7  ? 220 + Math.floor(Math.random()*35) : 255,
        px: parallaxFactor,
      });
    }
    return stars;
  }

  /* ── Nebulosas: capas de color profundo con parallax lento ── */
  var NEBULAE = [
    /* Nebulosa azul-violeta arriba-izquierda */
    { bx:.08, by:.12, rx:480, ry:320, rgb:[30,60,200],  a:.13, px:.006, py:.005, phase:0,   spd:.00018 },
    /* Nebulosa azul cian arriba-derecha */
    { bx:.85, by:.08, rx:360, ry:260, rgb:[0,120,240],  a:.09, px:.004, py:.003, phase:2.1, spd:.00022 },
    /* Nebulosa índigo centro */
    { bx:.5,  by:.45, rx:520, ry:380, rgb:[10,20,110],  a:.10, px:.003, py:.002, phase:4.5, spd:.00014 },
    /* Nebulosa naranja-rojo (estrella lejana) abajo-derecha */
    { bx:.82, by:.82, rx:300, ry:220, rgb:[180,50,10],  a:.06, px:.007, py:.006, phase:1.3, spd:.00026 },
    /* Nebulosa violeta abajo-izquierda */
    { bx:.15, by:.78, rx:340, ry:250, rgb:[80,20,180],  a:.07, px:.005, py:.004, phase:3.7, spd:.00019 },
    /* Nebulosa cyan pálida (tenue, grande) */
    { bx:.42, by:.18, rx:400, ry:300, rgb:[0,180,220],  a:.05, px:.002, py:.002, phase:5.2, spd:.00012 },
  ];

  /* ── Planeta (esfera realista con gradiente 3D) ── */
  var PLANET = {
    bx: .82, by: .15,       /* posición base relativa */
    r:  W > 768 ? 68 : 0,   /* radio (0 en móvil pequeño) */
    px: .022, py: .018,
    ringAngle: -0.28,        /* inclinación del anillo en radianes */
  };

  /* ── Shooting stars ── */
  var SHOOTS = [];
  function spawnShoot() {
    var edge = Math.random();
    SHOOTS.push({
      x:    edge * W,
      y:    Math.random() * H * .5,
      len:  Math.random() * 120 + 60,
      spd:  Math.random() * 6 + 5,
      ang:  Math.PI / 4 + (Math.random() - .5) * .4,
      alpha: 0,
      life:  0,
      maxLife: Math.random() * 40 + 30,
    });
  }
  /* Shoot star timer */
  var lastShoot = 0;
  var nextShootDelay = 3000 + Math.random() * 5000;

  /* ── Draw nebula with elliptical gradient ── */
  function drawNebula(o, t, mx, my) {
    var pulse = Math.sin(t * o.spd * 1000 + o.phase) * .08;
    var ox = o.bx * W - mx * W * o.px;
    var oy = o.by * H - my * H * o.py;
    var rx = o.rx * (1 + pulse);
    var ry = o.ry * (1 + pulse * .7);
    var al = o.a + pulse * .02;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(1, ry / rx);
    var g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
    g.addColorStop(0,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + (al * 1.4) + ')');
    g.addColorStop(.35, 'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + al + ')');
    g.addColorStop(1,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',0)');
    ctx.beginPath();
    ctx.arc(0, 0, rx, 0, 6.2832);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  /* ── Draw planet ── */
  function drawPlanet(mx, my, t) {
    var pr = PLANET.r;
    if (pr <= 0) return;
    var px = PLANET.bx * W - mx * W * PLANET.px;
    var py = PLANET.by * H - my * H * PLANET.py;

    /* Sombra difusa detrás del planeta */
    var shadow = ctx.createRadialGradient(px, py, pr * .6, px, py, pr * 2.2);
    shadow.addColorStop(0, 'rgba(0,20,80,.22)');
    shadow.addColorStop(1, 'rgba(0,20,80,0)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 2.2, 0, 6.2832);
    ctx.fillStyle = shadow;
    ctx.fill();

    /* Cuerpo del planeta — gradiente esférico 3D */
    var light = ctx.createRadialGradient(
      px - pr * .32, py - pr * .3, pr * .08,
      px, py, pr
    );
    light.addColorStop(0,   'rgba(80,140,255, .95)');
    light.addColorStop(.35, 'rgba(30,70,200,  .92)');
    light.addColorStop(.72, 'rgba(10,30,130,  .96)');
    light.addColorStop(1,   'rgba(2,8,60,     1)');
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, 6.2832);
    ctx.fillStyle = light;
    ctx.fill();

    /* Brillo atmosférico en el borde */
    var atm = ctx.createRadialGradient(px, py, pr * .82, px, py, pr * 1.14);
    atm.addColorStop(0, 'rgba(80,180,255,0)');
    atm.addColorStop(.6, 'rgba(60,160,255,.09)');
    atm.addColorStop(1, 'rgba(30,100,255,.18)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 1.14, 0, 6.2832);
    ctx.fillStyle = atm;
    ctx.fill();

    /* Anillo — elipse inclinada con clip para ocultar la parte trasera */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);

    /* Parte trasera del anillo (detrás del planeta) */
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, Math.PI, 0);
    ctx.strokeStyle = 'rgba(180,210,255,.28)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120,170,255,.15)';
    ctx.lineWidth = 14;
    ctx.stroke();

    /* Clip al círculo del planeta para tapar la parte del anillo que cruza */
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.clip();
    ctx.clearRect(-pr, -pr, pr * 2, pr * 2);

    /* Redibuja planeta encima del clip para no borrarlo */
    var light2 = ctx.createRadialGradient(
      -pr * .32, -pr * .3, pr * .08, 0, 0, pr
    );
    light2.addColorStop(0,   'rgba(80,140,255,.95)');
    light2.addColorStop(.35, 'rgba(30,70,200, .92)');
    light2.addColorStop(.72, 'rgba(10,30,130, .96)');
    light2.addColorStop(1,   'rgba(2,8,60,    1)');
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.fillStyle = light2;
    ctx.fill();
    ctx.restore();

    /* Parte delantera del anillo (delante del planeta) */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, 0, Math.PI);
    ctx.strokeStyle = 'rgba(200,225,255,.35)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(160,200,255,.18)';
    ctx.lineWidth = 14;
    ctx.stroke();
    ctx.restore();
  }

  /* ── Draw shooting star ── */
  function drawShoot(s) {
    var ex = s.x + Math.cos(s.ang) * s.len;
    var ey = s.y + Math.sin(s.ang) * s.len;
    var g = ctx.createLinearGradient(s.x, s.y, ex, ey);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(.6, 'rgba(200,230,255,' + s.alpha * .7 + ')');
    g.addColorStop(1, 'rgba(255,255,255,' + s.alpha + ')');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    /* Punta brillante */
    ctx.beginPath();
    ctx.arc(ex, ey, 1.2, 0, 6.2832);
    ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
    ctx.fill();
  }

  /* ── Main loop ── */
  function frame(now) {
    var t   = (now - t0) * .001;
    var dt  = now - (frame._last || now);
    frame._last = now;

    /* Smooth mouse lerp */
    mouseX += (mTX - mouseX) * .035;
    mouseY += (mTY - mouseY) * .035;
    var mx = (mouseX / W - .5);
    var my = (mouseY / H - .5);

    /* Fondo: negro espacio profundo */
    ctx.fillStyle = '#00020E';
    ctx.fillRect(0, 0, W, H);

    /* 1. Nebulosas (capa más profunda) */
    NEBULAE.forEach(function (o) { drawNebula(o, t, mx, my); });

    /* 2. Estrellas por capa (parallax diferencial) */
    STAR_LAYERS.forEach(function (layer) {
      layer.forEach(function (s) {
        var tw = Math.sin(t * s.twinkleSpd * 1000 + s.twinklePhase);
        /* Twinkle: varía alpha y tamaño levemente */
        var a  = s.alpha * (.65 + .35 * (tw * .5 + .5));
        var sz = s.size  * (.88 + .12 * (tw * .5 + .5));
        /* Parallax: estrellas lejanas se mueven menos */
        var sx = s.x * W - mx * W * s.px;
        var sy = s.y * H - my * H * s.px;

        /* Estrellas grandes: pequeño halo de difracción */
        if (sz > 1.8) {
          ctx.beginPath();
          ctx.arc(sx, sy, sz * 2.4, 0, 6.2832);
          ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + (a * .12) + ')';
          ctx.fill();
          /* Rayos de difracción (estrellas muy brillantes) */
          if (sz > 2.2) {
            ctx.save();
            ctx.globalAlpha = a * .18;
            ctx.strokeStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',1)';
            ctx.lineWidth = .6;
            for (var ang = 0; ang < 4; ang++) {
              var ra = ang * Math.PI / 4 + t * .08;
              ctx.beginPath();
              ctx.moveTo(sx + Math.cos(ra) * sz, sy + Math.sin(ra) * sz);
              ctx.lineTo(sx + Math.cos(ra) * sz * 5, sy + Math.sin(ra) * sz * 5);
              ctx.stroke();
            }
            ctx.restore();
          }
        }

        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, 6.2832);
        ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + a + ')';
        ctx.fill();
      });
    });

    /* 3. Planeta */
    drawPlanet(mx, my, t);

    /* 4. Shooting stars */
    if (now - lastShoot > nextShootDelay) {
      spawnShoot();
      lastShoot      = now;
      nextShootDelay = 4000 + Math.random() * 7000;
    }
    for (var i = SHOOTS.length - 1; i >= 0; i--) {
      var s = SHOOTS[i];
      s.life++;
      /* Fade in/out sobre el ciclo de vida */
      var progress = s.life / s.maxLife;
      s.alpha = progress < .25
        ? progress / .25
        : 1 - (progress - .25) / .75;
      s.alpha = Math.max(0, Math.min(1, s.alpha)) * .85;
      s.x += Math.cos(s.ang) * s.spd;
      s.y += Math.sin(s.ang) * s.spd;
      drawShoot(s);
      if (s.life >= s.maxLife) SHOOTS.splice(i, 1);
    }

    requestAnimationFrame(frame);
  }

  resizeCanvas();
  requestAnimationFrame(frame);

  /* ────────────────────────────────────────────────────────────
     SPLASH — secuencia de aparición por capas con micro-delays
  ──────────────────────────────────────────────────────────── */
  function reveal(id, delay) {
    setTimeout(function () {
      var el = document.getElementById(id);
      if (el) el.classList.add('reveal');
    }, delay);
  }

  reveal('spMascotWrap', 280);
  reveal('spTitle',      820);
  reveal('spTagline',   1180);
  reveal('spProg',      1420);

  /* Progress bar — rAF para suavidad real */
  var progStart = null;
  var PROG_DUR  = 2500; /* ms de duración del fill */

  setTimeout(function () {
    var fill = document.getElementById('spFill');
    function progFrame(now) {
      if (!progStart) progStart = now;
      var pct = Math.min((now - progStart) / PROG_DUR * 100, 100);
      /* Easing cuadrático para sensación de carga real */
      var eased = pct < 70 ? pct * .95 : 70 + (pct - 70) * 1.4;
      if (fill) fill.style.width = Math.min(eased, 100) + '%';
      if (pct < 100) requestAnimationFrame(progFrame);
    }
    requestAnimationFrame(progFrame);
  }, 1420);

  /* ────────────────────────────────────────────────────────────
     TRANSICIÓN SPLASH → LOGIN
     Fade + blur out / fade + slide in
  ──────────────────────────────────────────────────────────── */
  var transitioned = false;

  function doTransition() {
    if (transitioned) return;
    transitioned = true;

    var splash = document.getElementById('splash');
    var login  = document.getElementById('loginPage');

    /* 1. Splash exit */
    splash.classList.add('exit');

    /* 2. Login aparece con ligero delay para que se sienta como crossfade */
    setTimeout(function () {
      login.classList.add('show');
    }, 100);

    /* 3. Eliminar splash del DOM para liberar memoria */
    setTimeout(function () {
      if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      document.body.classList.add('ready');
    }, 850);
  }

  /* Trigger: 3.2s o cuando la página ya cargó completamente */
  var SPLASH_DURATION = 3200;
  var splashTimer = setTimeout(doTransition, SPLASH_DURATION);

  window.addEventListener('load', function () {
    /* Si la página carga muy rápido, esperar mínimo 2.8s para que se vea el splash */
    var elapsed = performance.now() - t0;
    var remaining = Math.max(2800 - elapsed, 0);
    clearTimeout(splashTimer);
    splashTimer = setTimeout(doTransition, remaining);
  });

  /* ────────────────────────────────────────────────────────────
     CONFIG DINÁMICA — logo y favicon desde API
  ──────────────────────────────────────────────────────────── */
  fetch(BASE + '/config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      if (!cfg) return;

      if (cfg.logo) {
        var img = '<img style="width:100%;height:100%;object-fit:contain" src="' + cfg.logo + '" alt="Logo">';
        var box = document.getElementById('lpLogoBox');
        var sp  = document.getElementById('spCircle');
        if (box) box.innerHTML = img;
        if (sp)  sp.innerHTML  = img;
      }

      if (cfg.favicon) {
        var fav = document.getElementById('dynFavicon');
        if (fav) fav.href = cfg.favicon;
      }
    })
    .catch(function () { /* logo local se mantiene */ });

  /* ────────────────────────────────────────────────────────────
     TOGGLE CONTRASEÑA
  ──────────────────────────────────────────────────────────── */
  var toggleBtn  = document.getElementById('togglePass');
  var passInput  = document.getElementById('inputPass');
  var passShown  = false;

  toggleBtn.addEventListener('click', function () {
    passShown      = !passShown;
    passInput.type = passShown ? 'text' : 'password';
    toggleBtn.innerHTML = passShown ? '&#128584;' : '&#128065;';
    toggleBtn.setAttribute('aria-label',
      passShown ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  /* ────────────────────────────────────────────────────────────
     FORMULARIO DE LOGIN
  ──────────────────────────────────────────────────────────── */
  var form    = document.getElementById('loginForm');
  var errBox  = document.getElementById('errBox');
  var btnEl   = document.getElementById('btnLogin');
  var userInp = document.getElementById('inputUser');

  /* Limpiar error al escribir */
  [userInp, passInput].forEach(function (inp) {
    inp.addEventListener('input', function () {
      errBox.classList.remove('show');
      inp.classList.remove('shake');
    });
  });

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');

    /* Shake en ambos inputs: forzar reflow para reiniciar animación */
    [userInp, passInput].forEach(function (inp) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
    });
    setTimeout(function () {
      [userInp, passInput].forEach(function (i) { i.classList.remove('shake'); });
    }, 500);
  }

  function setLoading(on) {
    btnEl.disabled = on;
    btnEl.innerHTML = on
      ? '<span class="btn-spinner"></span>Verificando\u2026'
      : 'Iniciar sesi\u00F3n';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errBox.classList.remove('show');

    var usuario  = userInp.value.trim();
    var password = passInput.value;

    if (!usuario || !password) {
      showErr('Ingrese usuario y contraseña para continuar');
      return;
    }

    setLoading(true);

    fetch(BASE + '/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ usuario: usuario, password: password })
    })
    .then(function (res) {
      return res.json().then(function (d) { return { ok: res.ok, d: d }; });
    })
    .then(function (r) {
      if (!r.ok) {
        showErr(r.d.error || 'Credenciales incorrectas');
        setLoading(false);
        return;
      }
      /* Éxito */
      btnEl.innerHTML = '&#10003; Acceso concedido';
      btnEl.classList.add('success');
      btnEl.disabled  = true;
      localStorage.setItem('biblio_token', r.d.token);
      localStorage.setItem('biblio_user',  JSON.stringify(r.d.user));
      setTimeout(function () { location.href = 'index.html'; }, 680);
    })
    .catch(function () {
      showErr('Error de conexión. Verifique que el servidor esté activo.');
      setLoading(false);
    });
  });

})();
</script>
</body>
</html>
