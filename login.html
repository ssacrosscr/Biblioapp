<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuKiBooks — Biblioteca Escolar</title>
  <link rel="icon" href="https://www.mep.go.cr/favicon.ico" id="dynFavicon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ─────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #00071A;
      -webkit-font-smoothing: antialiased;
    }
    body.ready { overflow-y: auto; }

    /* ─────────────────────────────────────────────
       CANVAS — siempre visible, detrás de todo
    ───────────────────────────────────────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       SPLASH MÁGICO
    ───────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
      will-change: opacity, filter;
      transition: opacity .9s cubic-bezier(.4,0,.2,1),
                  filter   .9s cubic-bezier(.4,0,.2,1);
    }
    #splash.exit {
      opacity: 0;
      filter: blur(18px) scale(1.04);
      pointer-events: none;
    }

    /* Canvas mágico exclusivo del splash */
    #spCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── MASCOTA ── */
    #spMascotWrap {
      position: relative;
      width: 200px; height: 200px;
      z-index: 2;
      opacity: 0;
      transform: scale(.3) translateY(30px);
      will-change: opacity, transform;
      transition: opacity 1.1s cubic-bezier(.22,1,.36,1),
                  transform 1.1s cubic-bezier(.22,1,.36,1);
      margin-bottom: 32px;
    }
    #spMascotWrap.reveal { opacity: 1; transform: scale(1) translateY(0); }

    /* Bob en elemento hijo para no interferir con reveal */
    .sp-bob {
      position: relative;
      width: 100%; height: 100%;
      animation: sp-bob 4.8s ease-in-out infinite;
    }
    @keyframes sp-bob {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30%     { transform: translateY(-16px) rotate(-1.5deg); }
      70%     { transform: translateY(-10px) rotate(1.2deg); }
    }

    /* Halo exterior grande */
    .sp-halo {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .sp-halo-1 {
      inset: -70px;
      background: radial-gradient(circle,
        rgba(140,60,255,.52) 0%,
        rgba(0,140,255,.28) 40%,
        transparent 70%);
      filter: blur(1px);
      animation: halo-breathe 4s ease-in-out infinite;
    }
    .sp-halo-2 {
      inset: -35px;
      background: radial-gradient(circle,
        rgba(255,180,0,.38) 0%,
        rgba(255,100,0,.18) 45%,
        transparent 70%);
      animation: halo-breathe 5.2s ease-in-out infinite reverse;
    }
    .sp-halo-3 {
      inset: -110px;
      background: radial-gradient(circle,
        rgba(0,255,220,.18) 0%,
        rgba(0,160,255,.10) 45%,
        transparent 68%);
      animation: halo-breathe 7s ease-in-out infinite;
    }
    @keyframes halo-breathe {
      0%,100% { transform: scale(1);    opacity: .75; }
      50%     { transform: scale(1.22); opacity: 1; }
    }

    /* Anillos mágicos */
    .sp-ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      top: 50%; left: 50%;
      pointer-events: none;
    }
    /* Anillo dorado — grande, lento */
    .sp-ring-gold {
      width: 230px; height: 230px;
      margin: -115px;
      border-width: 1.5px;
      border-color: rgba(255,220,0,.55);
      box-shadow: 0 0 14px rgba(255,210,0,.5),
                  0 0 28px rgba(255,180,0,.22),
                  inset 0 0 14px rgba(255,200,0,.12);
      animation: ring-spin-cw 18s linear infinite;
    }
    /* Anillo cian — mediano, velocidad media */
    .sp-ring-cyan {
      width: 190px; height: 190px;
      margin: -95px;
      border-width: 1.5px;
      border-color: rgba(0,255,240,.6);
      box-shadow: 0 0 12px rgba(0,240,255,.55),
                  0 0 26px rgba(0,200,255,.28),
                  inset 0 0 12px rgba(0,220,255,.15);
      animation: ring-spin-ccw 12s linear infinite;
    }
    /* Anillo magenta — pequeño, rápido */
    .sp-ring-magic {
      width: 155px; height: 155px;
      margin: -77px;
      border-width: 1.5px;
      border-color: rgba(255,0,220,.55);
      box-shadow: 0 0 12px rgba(255,0,200,.5),
                  0 0 24px rgba(220,0,255,.22),
                  inset 0 0 10px rgba(200,0,255,.12);
      animation: ring-spin-cw 8s linear infinite;
    }
    /* Anillo lima — extra grande, muy lento */
    .sp-ring-lime {
      width: 275px; height: 275px;
      margin: -137px;
      border-width: 1px;
      border-color: rgba(0,255,120,.28);
      box-shadow: 0 0 10px rgba(0,255,100,.22),
                  0 0 22px rgba(0,220,80,.12);
      animation: ring-spin-ccw 26s linear infinite;
    }
    @keyframes ring-spin-cw  { to { transform: rotate(360deg); } }
    @keyframes ring-spin-ccw { to { transform: rotate(-360deg); } }

    /* Puntos en los anillos */
    .sp-ring-dot {
      position: absolute;
      border-radius: 50%;
      top: -5px; left: 50%; transform: translateX(-50%);
    }
    .sp-ring-gold  .sp-ring-dot { width:11px;height:11px; background:#FFE500; box-shadow:0 0 14px #FFE500,0 0 28px rgba(255,200,0,.7),0 0 48px rgba(255,160,0,.3); }
    .sp-ring-cyan  .sp-ring-dot { width:9px; height:9px;  background:#00FFEE; box-shadow:0 0 12px #00FFEE,0 0 24px rgba(0,240,255,.7),0 0 42px rgba(0,200,255,.3); top:-4px; }
    .sp-ring-magic .sp-ring-dot { width:8px; height:8px;  background:#FF00DD; box-shadow:0 0 11px #FF00DD,0 0 22px rgba(255,0,200,.7),0 0 40px rgba(200,0,255,.3); top:-4px; }
    .sp-ring-lime  .sp-ring-dot { width:7px; height:7px;  background:#00FF80; box-shadow:0 0 10px #00FF80,0 0 20px rgba(0,255,100,.6),0 0 36px rgba(0,220,80,.25); top:-3px; }

    /* Segundo punto en anillo dorado (en posición opuesta) */
    .sp-ring-gold .sp-ring-dot-2 {
      top: auto; bottom: -5px;
      width: 8px; height: 8px;
      background: #FF9940;
      box-shadow: 0 0 12px #FF9940, 0 0 24px rgba(255,140,0,.6);
    }

    /* Imagen de la mascota */
    .sp-circle {
      position: relative;
      z-index: 3;
      width: 200px; height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sp-circle img {
      width: 170px; height: 170px;
      object-fit: contain;
      display: block;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 20px rgba(0,200,255,.6))
              drop-shadow(0 0 44px rgba(100,50,255,.3))
              drop-shadow(0 8px 24px rgba(0,0,0,.4));
    }

    /* ── ESTRELLAS DESTELLANTES CSS (decorativas) ── */
    .sp-sparkle {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      animation: sp-sparkle-anim ease-in-out infinite;
    }
    .sp-sparkle::before, .sp-sparkle::after {
      content: '';
      position: absolute;
      background: currentColor;
      border-radius: 99px;
    }
    /* Cruz de 4 puntas */
    .sp-sparkle::before { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
    .sp-sparkle::after  { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
    @keyframes sp-sparkle-anim {
      0%,100% { opacity:0;  transform: scale(.4) rotate(0deg); }
      40%,60% { opacity:1;  transform: scale(1)  rotate(45deg); }
    }

    /* ── TÍTULO ── */
    #spTitleWrap {
      z-index: 2;
      text-align: center;
      opacity: 0;
      will-change: opacity;
      transition: opacity .5s ease;
      margin-bottom: 14px;
    }
    #spTitleWrap.reveal { opacity: 1; }

    .sp-title-main {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      /* Gradiente animado sobre el texto */
      background: linear-gradient(135deg,
        #ffffff 0%,
        #e0f0ff 20%,
        #ffffff 38%,
        #FFD700 50%,
        #FF9940 62%,
        #ffffff 80%,
        #d0e8ff 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: title-shimmer 4s ease-in-out infinite;
    }
    @keyframes title-shimmer {
      0%   { background-position: 100% 0; }
      50%  { background-position:   0% 0; }
      100% { background-position: 100% 0; }
    }

    /* Letras individuales — pop en secuencia */
    .sp-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(24px) scale(.7);
      will-change: opacity, transform;
      animation: letter-pop .6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes letter-pop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .sp-mep {
      margin-top: 10px;
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(255,255,255,.28);
      text-transform: uppercase;
      letter-spacing: .2em;
      opacity: 0;
      animation: fade-up .7s ease .9s forwards;
    }
    @keyframes fade-up {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── TAGLINE — palabra por palabra ── */
    #spTagline {
      z-index: 2;
      text-align: center;
      font-size: 15px;
      font-style: italic;
      color: rgba(255,255,255,.55);
      max-width: 320px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .sp-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) blur(4px);
      animation: word-in .55s cubic-bezier(.22,1,.36,1) forwards;
    }
    /* filter: blur() no es animable directamente, usamos filter como propiedad */
    @keyframes word-in {
      from { opacity:0; transform: translateY(10px); filter: blur(4px); }
      to   { opacity:1; transform: translateY(0);    filter: blur(0); }
    }

    /* ── PROGRESS ── */
    #spProgWrap {
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity .5s ease;
    }
    #spProgWrap.reveal { opacity: 1; }
    .sp-prog-track {
      width: 160px; height: 2px;
      background: rgba(255,255,255,.07);
      border-radius: 99px;
      overflow: visible;
      position: relative;
    }
    #spFill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      position: relative;
      background: linear-gradient(90deg,
        rgba(100,60,255,.6) 0%,
        rgba(0,180,255,.9) 45%,
        #FFD700 100%
      );
      box-shadow: 0 0 8px rgba(0,200,255,.5);
      transition: width .1s linear;
    }
    /* Punto brillante en la punta del progreso */
    #spFill::after {
      content: '';
      position: absolute;
      right: -3px; top: 50%;
      transform: translateY(-50%);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px #fff, 0 0 16px rgba(0,220,255,.8);
    }
    .sp-prog-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.2);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────────
       LOGIN PAGE
    ───────────────────────────────────────────── */
    #loginPage {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
      transition: opacity .65s ease;
    }
    #loginPage.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Glass card */
    .lp-card {
      position: relative;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.055);
      backdrop-filter: blur(44px) saturate(1.6);
      -webkit-backdrop-filter: blur(44px) saturate(1.6);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      padding: 48px 42px;
      box-shadow:
        0 48px 120px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04),
        inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
      transform: translateY(28px);
      will-change: transform;
      transition: transform .75s cubic-bezier(.22,1,.36,1);
    }
    #loginPage.show .lp-card { transform: translateY(0); }

    /* Inner glow blobs (decorative) */
    .lp-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(40px);
    }
    .lp-blob-1 {
      width: 260px; height: 260px;
      top: -100px; left: -80px;
      background: radial-gradient(circle, rgba(0,70,200,.14), transparent 70%);
    }
    .lp-blob-2 {
      width: 200px; height: 200px;
      bottom: -80px; right: -60px;
      background: radial-gradient(circle, rgba(255,80,0,.08), transparent 70%);
    }

    /* Card content above blobs */
    .lp-inner { position: relative; z-index: 1; }

    /* Logo */
    .lp-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .lp-logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 104px; height: 104px;
      margin-bottom: 14px;
      position: relative;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,160,255,.25),
                  0 0 20px rgba(0,140,255,.3),
                  0 4px 14px rgba(0,0,0,.45);
      transition: box-shadow .35s;
    }
    .lp-logo-box:hover {
      box-shadow: 0 0 0 1px rgba(0,200,255,.4),
                  0 0 30px rgba(0,180,255,.45),
                  0 4px 18px rgba(0,0,0,.5);
    }
    .lp-logo-box img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .lp-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }
    .lp-brand .or { color: #FF9940; }
    .lp-brand-sub {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.28);
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    /* Heading */
    .lp-heading { margin-bottom: 26px; }
    .lp-heading-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .lp-heading-sub {
      font-size: 13px;
      color: rgba(255,255,255,.38);
    }

    /* Error box */
    .lp-err {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,60,60,.1);
      border: 1px solid rgba(255,80,80,.22);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,160,160,.95);
      animation: err-in .3s cubic-bezier(.22,1,.36,1);
    }
    .lp-err.show { display: block; }
    @keyframes err-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Field group */
    .fg { margin-bottom: 18px; }
    .fl {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
      margin-bottom: 8px;
    }
    .fi-wrap { position: relative; }

    /* Input */
    .fi {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 46px 14px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: #fff;
      outline: none;
      will-change: border-color, box-shadow;
      transition: background .25s, border-color .25s, box-shadow .25s;
    }
    .fi::placeholder { color: rgba(255,255,255,.2); }
    .fi:focus {
      background: rgba(255,255,255,.09);
      border-color: rgba(0,180,255,.6);
      box-shadow: 0 0 0 3px rgba(0,160,255,.12),
                  0 0 28px rgba(0,120,255,.07);
    }
    /* Shake on error — added/removed by JS */
    .fi.shake {
      border-color: rgba(255,80,80,.65);
      animation: shake .45s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%,54%  { transform: translateX(-8px); }
      36%,72%  { transform: translateX(8px); }
    }

    /* Input icon */
    .fi-ico {
      position: absolute;
      right: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: .3;
      pointer-events: none;
    }
    /* Toggle password button */
    .fi-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: rgba(255,255,255,.35);
      padding: 5px;
      line-height: 1;
      transition: color .2s;
    }
    .fi-toggle:hover { color: rgba(255,255,255,.7); }

    /* Submit button */
    .btn-login {
      width: 100%;
      margin-top: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #003DA5 0%, #1558CC 50%, #003DA5 100%);
      background-size: 200% 100%;
      will-change: background-position, box-shadow, transform;
      transition:
        background-position .45s ease,
        box-shadow .3s ease,
        transform .15s ease;
    }
    /* Shimmer layer */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,.18) 45%,
        rgba(255,255,255,.22) 50%,
        rgba(255,255,255,.18) 55%,
        transparent 100%);
      transform: translateX(-110%) skewX(-20deg);
      transition: transform 0s;
    }
    .btn-login:hover:not(:disabled) {
      background-position: 100% 0;
      box-shadow: 0 14px 40px rgba(0,61,165,.45),
                  0 4px 12px rgba(0,80,200,.28);
      transform: translateY(-1px);
    }
    .btn-login:hover:not(:disabled)::before {
      animation: shimmer .6s ease-in-out forwards;
    }
    @keyframes shimmer {
      to { transform: translateX(140%) skewX(-20deg); }
    }
    .btn-login:active:not(:disabled) {
      transform: scale(.985);
      box-shadow: 0 4px 16px rgba(0,61,165,.3);
    }
    .btn-login:disabled { opacity: .68; cursor: not-allowed; }
    .btn-login.success {
      background: linear-gradient(135deg, #0A6640, #1B8050) !important;
      background-position: 0 0 !important;
      box-shadow: 0 14px 40px rgba(10,102,64,.4) !important;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .lp-footer {
      margin-top: 26px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,.17);
      letter-spacing: .05em;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .lp-card { padding: 36px 24px; border-radius: 22px; }
      .sp-title-main { font-size: 42px; }
      .lp-heading-title { font-size: 24px; }
    }

  </style>
</head>
<body>

<!-- ── Canvas (fondo siempre vivo) ── -->
<canvas id="bgCanvas"></canvas>

<!-- ══════════════════════════════════════════════════
     SPLASH MÁGICO
══════════════════════════════════════════════════ -->
<div id="splash">

  <!-- Canvas de partículas mágicas (fireflies, polvo de hadas) -->
  <canvas id="spCanvas"></canvas>

  <!-- Estrellas CSS decorativas (posicionadas desde JS) -->
  <div id="spSparkles"></div>

  <!-- Mascota central con anillos mágicos -->
  <div id="spMascotWrap">
    <div class="sp-bob">
      <!-- Halos de luz -->
      <div class="sp-halo sp-halo-1"></div>
      <div class="sp-halo sp-halo-2"></div>
      <div class="sp-halo sp-halo-3"></div>
      <!-- Anillo lima (exterior) -->
      <div class="sp-ring sp-ring-lime">
        <div class="sp-ring-dot"></div>
      </div>
      <!-- Anillo dorado -->
      <div class="sp-ring sp-ring-gold">
        <div class="sp-ring-dot"></div>
        <div class="sp-ring-dot sp-ring-dot-2"></div>
      </div>
      <!-- Anillo cian -->
      <div class="sp-ring sp-ring-cyan">
        <div class="sp-ring-dot"></div>
      </div>
      <!-- Anillo mágico -->

<script>
/* ================================================================
   LuKiBooks — Splash + Login
   Single-file, zero dependencies, 60fps
================================================================ */
(function () {
  'use strict';

  /* ── Config ── */
  var isLocal = location.hostname === 'localhost'
             || location.hostname === '127.0.0.1';
  var BASE = isLocal
    ? 'http://localhost:3000/api'
    : 'https://biblioapp-nclh.onrender.com/api';

  /* Redirect si ya hay sesión */
  if (localStorage.getItem('biblio_token')) {
    location.href = 'index.html';
    return;
  }

  /* ────────────────────────────────────────────────────────────
     CANVAS — Universo espacial realista: 60fps, parallax, nebulosas
  ──────────────────────────────────────────────────────────── */
  var canvas = document.getElementById('bgCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H, t0 = performance.now();
  var mouseX = 0, mouseY = 0, mTX = 0, mTY = 0;

  function resizeCanvas() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    mTX = mouseX = W * .5;
    mTY = mouseY = H * .5;
    buildStars(); /* reconstruir al resize */
  }

  document.addEventListener('mousemove', function (e) { mTX = e.clientX; mTY = e.clientY; });
  window.addEventListener('resize', resizeCanvas);

  /* ── Estrellas: 3 capas de profundidad (parallax real) ── */
  var STAR_LAYERS = [];

  function buildStars() {
    STAR_LAYERS = [
      /* Capa lejana: muchas, pequeñas, lentas */
      buildLayer(280, .15, 1.1,  .003),
      /* Capa media */
      buildLayer(130, .5,  1.8,  .008),
      /* Capa cercana: pocas, grandes, rápidas */
      buildLayer(40,  .9,  2.8,  .018),
    ];
  }

  function buildLayer(count, baseAlpha, maxSize, parallaxFactor) {
    var stars = [];
    for (var i = 0; i < count; i++) {
      var size = Math.random() * maxSize + .3;
      stars.push({
        x:    Math.random(),
        y:    Math.random(),
        size: size,
        alpha: baseAlpha * (.4 + Math.random() * .6),
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpd:   Math.random() * .0028 + .0008,
        /* Color: mayoría blancas, algunas azul-hielo, pocas cálidas */
        r: 255,
        g: Math.random() > .85 ? 200 + Math.floor(Math.random()*55) : 255,
        b: Math.random() > .7  ? 220 + Math.floor(Math.random()*35) : 255,
        px: parallaxFactor,
      });
    }
    return stars;
  }

  /* ── Nebulosas: capas de color profundo con parallax lento ── */
  var NEBULAE = [
    /* Nebulosa azul-violeta arriba-izquierda */
    { bx:.08, by:.12, rx:480, ry:320, rgb:[30,60,200],  a:.13, px:.006, py:.005, phase:0,   spd:.00018 },
    /* Nebulosa azul cian arriba-derecha */
    { bx:.85, by:.08, rx:360, ry:260, rgb:[0,120,240],  a:.09, px:.004, py:.003, phase:2.1, spd:.00022 },
    /* Nebulosa índigo centro */
    { bx:.5,  by:.45, rx:520, ry:380, rgb:[10,20,110],  a:.10, px:.003, py:.002, phase:4.5, spd:.00014 },
    /* Nebulosa naranja-rojo (estrella lejana) abajo-derecha */
    { bx:.82, by:.82, rx:300, ry:220, rgb:[180,50,10],  a:.06, px:.007, py:.006, phase:1.3, spd:.00026 },
    /* Nebulosa violeta abajo-izquierda */
    { bx:.15, by:.78, rx:340, ry:250, rgb:[80,20,180],  a:.07, px:.005, py:.004, phase:3.7, spd:.00019 },
    /* Nebulosa cyan pálida (tenue, grande) */
    { bx:.42, by:.18, rx:400, ry:300, rgb:[0,180,220],  a:.05, px:.002, py:.002, phase:5.2, spd:.00012 },
  ];

  /* ── Partículas flotantes (luciérnagas — capa viva del fondo) ── */
  var BGFLIES = (function () {
    var arr = [];
    var COLS = [
      [255, 220,  50],  /* dorado */
      [  0, 240, 255],  /* cian */
      [255, 255, 255],  /* blanco */
      [200,  80, 255],  /* magenta */
      [  0, 255, 130],  /* lima */
      [100, 160, 255],  /* azul suave */
    ];
    for (var i = 0; i < 90; i++) {
      var col = COLS[Math.floor(Math.random() * COLS.length)];
      arr.push({
        /* Posición base aleatoria en toda la pantalla */
        ox: Math.random(),
        oy: Math.random(),
        /* Oscilación independiente en X e Y */
        ax: Math.random() * Math.PI * 2,
        ay: Math.random() * Math.PI * 2,
        fx: Math.random() * .00045 + .00015,
        fy: Math.random() * .00045 + .00020,
        rx: Math.random() * 55 + 20,   /* radio oscilación x */
        ry: Math.random() * 40 + 15,   /* radio oscilación y */
        /* Movimiento de deriva lenta (drift) */
        dx: (Math.random() - .5) * .000012,
        dy: (Math.random() - .5) * .000008,
        /* Apariencia */
        r: col,
        sz:  Math.random() * 1.6 + .5,
        alp: Math.random() * .5 + .15,
        /* Pulso de brillo propio */
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpd:   Math.random() * .0012 + .0004,
      });
    }
    return arr;
  })();

  function drawBgFlies(t, now) {
    BGFLIES.forEach(function (f) {
      /* Drift lento — posición base se mueve muy despacio */
      f.ox += f.dx;
      f.oy += f.dy;
      /* Wrap alrededor de la pantalla */
      if (f.ox < -.05) f.ox = 1.05;
      if (f.ox > 1.05) f.ox = -.05;
      if (f.oy < -.05) f.oy = 1.05;
      if (f.oy > 1.05) f.oy = -.05;

      /* Posición con oscilación orgánica */
      var px = f.ox * W + Math.sin(now * f.fx + f.ax) * f.rx;
      var py = f.oy * H + Math.cos(now * f.fy + f.ay) * f.ry;

      /* Pulso de brillo */
      var pulse = Math.sin(t * f.pulseSpd * 1000 + f.pulsePhase) * .5 + .5;
      var al    = f.alp * (.5 + .5 * pulse);
      var sz    = f.sz  * (.85 + .15 * pulse);

      var c = f.r;
      /* Halo exterior difuso */
      var g = ctx.createRadialGradient(px, py, 0, px, py, sz * 5.5);
      g.addColorStop(0,   'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (al * .9) + ')');
      g.addColorStop(.35, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (al * .35) + ')');
      g.addColorStop(1,   'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
      ctx.beginPath();
      ctx.arc(px, py, sz * 5.5, 0, 6.2832);
      ctx.fillStyle = g;
      ctx.fill();

      /* Núcleo brillante */
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, 6.2832);
      ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + Math.min(al * 1.8, 1) + ')';
      ctx.fill();
    });
  }

  /* ── Planeta (esfera realista con gradiente 3D) ── */
  var PLANET = {
    bx: .82, by: .15,       /* posición base relativa */
    r:  W > 768 ? 68 : 0,   /* radio (0 en móvil pequeño) */
    px: .022, py: .018,
    ringAngle: -0.28,        /* inclinación del anillo en radianes */
  };

  /* ── Shooting stars ── */
  var SHOOTS = [];
  function spawnShoot() {
    var edge = Math.random();
    SHOOTS.push({
      x:    edge * W,
      y:    Math.random() * H * .5,
      len:  Math.random() * 120 + 60,
      spd:  Math.random() * 6 + 5,
      ang:  Math.PI / 4 + (Math.random() - .5) * .4,
      alpha: 0,
      life:  0,
      maxLife: Math.random() * 40 + 30,
    });
  }
  /* Shoot star timer */
  var lastShoot = 0;
  var nextShootDelay = 3000 + Math.random() * 5000;

  /* ── Draw nebula with elliptical gradient ── */
  function drawNebula(o, t, mx, my) {
    var pulse = Math.sin(t * o.spd * 1000 + o.phase) * .08;
    var ox = o.bx * W - mx * W * o.px;
    var oy = o.by * H - my * H * o.py;
    var rx = o.rx * (1 + pulse);
    var ry = o.ry * (1 + pulse * .7);
    var al = o.a + pulse * .02;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(1, ry / rx);
    var g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
    g.addColorStop(0,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + (al * 1.4) + ')');
    g.addColorStop(.35, 'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + al + ')');
    g.addColorStop(1,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',0)');
    ctx.beginPath();
    ctx.arc(0, 0, rx, 0, 6.2832);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  /* ── Draw planet ── */
  function drawPlanet(mx, my, t) {
    var pr = PLANET.r;
    if (pr <= 0) return;
    var px = PLANET.bx * W - mx * W * PLANET.px;
    var py = PLANET.by * H - my * H * PLANET.py;

    /* Sombra difusa detrás del planeta */
    var shadow = ctx.createRadialGradient(px, py, pr * .6, px, py, pr * 2.2);
    shadow.addColorStop(0, 'rgba(0,20,80,.22)');
    shadow.addColorStop(1, 'rgba(0,20,80,0)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 2.2, 0, 6.2832);
    ctx.fillStyle = shadow;
    ctx.fill();

    /* Cuerpo del planeta — gradiente esférico 3D */
    var light = ctx.createRadialGradient(
      px - pr * .32, py - pr * .3, pr * .08,
      px, py, pr
    );
    light.addColorStop(0,   'rgba(80,140,255, .95)');
    light.addColorStop(.35, 'rgba(30,70,200,  .92)');
    light.addColorStop(.72, 'rgba(10,30,130,  .96)');
    light.addColorStop(1,   'rgba(2,8,60,     1)');
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, 6.2832);
    ctx.fillStyle = light;
    ctx.fill();

    /* Brillo atmosférico en el borde */
    var atm = ctx.createRadialGradient(px, py, pr * .82, px, py, pr * 1.14);
    atm.addColorStop(0, 'rgba(80,180,255,0)');
    atm.addColorStop(.6, 'rgba(60,160,255,.09)');
    atm.addColorStop(1, 'rgba(30,100,255,.18)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 1.14, 0, 6.2832);
    ctx.fillStyle = atm;
    ctx.fill();

    /* Anillo — elipse inclinada con clip para ocultar la parte trasera */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);

    /* Parte trasera del anillo (detrás del planeta) */
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, Math.PI, 0);
    ctx.strokeStyle = 'rgba(180,210,255,.28)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120,170,255,.15)';
    ctx.lineWidth = 14;
    ctx.stroke();

    /* Clip al círculo del planeta para tapar la parte del anillo que cruza */
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.clip();
    ctx.clearRect(-pr, -pr, pr * 2, pr * 2);

    /* Redibuja planeta encima del clip para no borrarlo */
    var light2 = ctx.createRadialGradient(
      -pr * .32, -pr * .3, pr * .08, 0, 0, pr
    );
    light2.addColorStop(0,   'rgba(80,140,255,.95)');
    light2.addColorStop(.35, 'rgba(30,70,200, .92)');
    light2.addColorStop(.72, 'rgba(10,30,130, .96)');
    light2.addColorStop(1,   'rgba(2,8,60,    1)');
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.fillStyle = light2;
    ctx.fill();
    ctx.restore();

    /* Parte delantera del anillo (delante del planeta) */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, 0, Math.PI);
    ctx.strokeStyle = 'rgba(200,225,255,.35)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(160,200,255,.18)';
    ctx.lineWidth = 14;
    ctx.stroke();
    ctx.restore();
  }

  /* ── Draw shooting star ── */
  function drawShoot(s) {
    var ex = s.x + Math.cos(s.ang) * s.len;
    var ey = s.y + Math.sin(s.ang) * s.len;
    var g = ctx.createLinearGradient(s.x, s.y, ex, ey);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(.6, 'rgba(200,230,255,' + s.alpha * .7 + ')');
    g.addColorStop(1, 'rgba(255,255,255,' + s.alpha + ')');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    /* Punta brillante */
    ctx.beginPath();
    ctx.arc(ex, ey, 1.2, 0, 6.2832);
    ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
    ctx.fill();
  }

  /* ── Main loop ── */
  function frame(now) {
    var t   = (now - t0) * .001;
    var dt  = now - (frame._last || now);
    frame._last = now;

    /* Smooth mouse lerp */
    mouseX += (mTX - mouseX) * .035;
    mouseY += (mTY - mouseY) * .035;
    var mx = (mouseX / W - .5);
    var my = (mouseY / H - .5);

    /* Fondo: negro espacio profundo */
    ctx.fillStyle = '#00020E';
    ctx.fillRect(0, 0, W, H);

    /* 1. Nebulosas (capa más profunda) */
    NEBULAE.forEach(function (o) { drawNebula(o, t, mx, my); });

    /* 2. Estrellas por capa (parallax diferencial) */
    STAR_LAYERS.forEach(function (layer) {
      layer.forEach(function (s) {
        var tw = Math.sin(t * s.twinkleSpd * 1000 + s.twinklePhase);
        /* Twinkle: varía alpha y tamaño levemente */
        var a  = s.alpha * (.65 + .35 * (tw * .5 + .5));
        var sz = s.size  * (.88 + .12 * (tw * .5 + .5));
        /* Parallax: estrellas lejanas se mueven menos */
        var sx = s.x * W - mx * W * s.px;
        var sy = s.y * H - my * H * s.px;

        /* Estrellas grandes: pequeño halo de difracción */
        if (sz > 1.8) {
          ctx.beginPath();
          ctx.arc(sx, sy, sz * 2.4, 0, 6.2832);
          ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + (a * .12) + ')';
          ctx.fill();
          /* Rayos de difracción (estrellas muy brillantes) */
          if (sz > 2.2) {
            ctx.save();
            ctx.globalAlpha = a * .18;
            ctx.strokeStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',1)';
            ctx.lineWidth = .6;
            for (var ang = 0; ang < 4; ang++) {
              var ra = ang * Math.PI / 4 + t * .08;
              ctx.beginPath();
              ctx.moveTo(sx + Math.cos(ra) * sz, sy + Math.sin(ra) * sz);
              ctx.lineTo(sx + Math.cos(ra) * sz * 5, sy + Math.sin(ra) * sz * 5);
              ctx.stroke();
            }
            ctx.restore();
          }
        }

        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, 6.2832);
        ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + a + ')';
        ctx.fill();
      });
    });

    /* 3. Planeta */
    drawPlanet(mx, my, t);

    /* 4. Partículas flotantes (luciérnagas de fondo) */
    drawBgFlies(t, now);

    /* 5. Shooting stars */
    if (now - lastShoot > nextShootDelay) {
      spawnShoot();
      lastShoot      = now;
      nextShootDelay = 1800 + Math.random() * 3500;
    }
    for (var i = SHOOTS.length - 1; i >= 0; i--) {
      var s = SHOOTS[i];
      s.life++;
      /* Fade in/out sobre el ciclo de vida */
      var progress = s.life / s.maxLife;
      s.alpha = progress < .25
        ? progress / .25
        : 1 - (progress - .25) / .75;
      s.alpha = Math.max(0, Math.min(1, s.alpha)) * .85;
      s.x += Math.cos(s.ang) * s.spd;
      s.y += Math.sin(s.ang) * s.spd;
      drawShoot(s);
      if (s.life >= s.maxLife) SHOOTS.splice(i, 1);
    }

    requestAnimationFrame(frame);
  }

  resizeCanvas();
  requestAnimationFrame(frame);

  /* ────────────────────────────────────────────────────────────
     SPLASH MÁGICO — secuencia cinematográfica por capas
  ──────────────────────────────────────────────────────────── */

  /* ── Canvas de partículas mágicas (fireflies + polvo) ── */
  (function initSplashCanvas() {
    var sc  = document.getElementById('spCanvas');
    if (!sc) return;
    var sctx = sc.getContext('2d');
    var sw, sh;

    function sResize() {
      sw = sc.width  = window.innerWidth;
      sh = sc.height = window.innerHeight;
    }
    sResize();
    window.addEventListener('resize', sResize);

    /* Fireflies: partículas pequeñas con movimiento orgánico */
    var FLIES = (function () {
      var arr = [], CX = window.innerWidth * .5, CY = window.innerHeight * .5;
      /* Colores mágicos: dorado, cian, blanco, magenta suave */
      var COLS = [
        [255, 215,  60],  /* dorado */
        [  0, 220, 255],  /* cian */
        [255, 255, 255],  /* blanco */
        [200, 100, 255],  /* magenta */
        [100, 255, 180],  /* mint */
      ];
      for (var i = 0; i < 70; i++) {
        var angle  = Math.random() * Math.PI * 2;
        var dist   = Math.random() * 220 + 30;
        var col    = COLS[Math.floor(Math.random() * COLS.length)];
        arr.push({
          /* Posición base relativa al centro */
          ox: CX + Math.cos(angle) * dist,
          oy: CY + Math.sin(angle) * dist - 60, /* -60 para centrar en mascota */
          /* Movimiento oscilatorio único */
          ax: Math.random() * Math.PI * 2,
          ay: Math.random() * Math.PI * 2,
          fx: Math.random() * .0005 + .0002, /* frecuencia x */
          fy: Math.random() * .0005 + .0003, /* frecuencia y */
          rx: Math.random() * 28 + 8,  /* radio oscilación x */
          ry: Math.random() * 20 + 6,  /* radio oscilación y */
          r:  col,
          size: Math.random() * 2 + .6,
          peak: Math.random() * .7 + .25,
          tp:   Math.random() * Math.PI * 2, /* fase de twinkle */
          tspd: Math.random() * .003 + .001,
          born: false, /* se activa tras delay inicial */
          delay: Math.random() * 600 + 200, /* ms de aparición escalonada */
        });
      }
      return arr;
    })();

    var spStart = performance.now();

    function splashFrame(now) {
      if (!document.getElementById('splash')) return; /* splash eliminado */
      sctx.clearRect(0, 0, sw, sh);
      var t = (now - spStart) * .001;

      FLIES.forEach(function (f) {
        /* Activar gradualmente */
        if (!f.born) {
          if ((now - spStart) < f.delay) return;
          f.born = true;
        }
        /* Posición con oscilación suave */
        var x = f.ox + Math.sin(t * f.fx * 1000 + f.ax) * f.rx;
        var y = f.oy + Math.cos(t * f.fy * 1000 + f.ay) * f.ry;

        /* Twinkle alpha */
        var tw = Math.sin(t * f.tspd * 1000 + f.tp);
        var a  = f.peak * (.5 + .5 * (tw * .5 + .5));

        /* Halo difuso */
        var g = sctx.createRadialGradient(x, y, 0, x, y, f.size * 4.5);
        g.addColorStop(0, 'rgba(' + f.r[0] + ',' + f.r[1] + ',' + f.r[2] + ',' + (a * .35) + ')');
        g.addColorStop(1, 'rgba(' + f.r[0] + ',' + f.r[1] + ',' + f.r[2] + ',0)');
        sctx.beginPath();
        sctx.arc(x, y, f.size * 4.5, 0, 6.2832);
        sctx.fillStyle = g;
        sctx.fill();

        /* Núcleo */
        sctx.beginPath();
        sctx.arc(x, y, f.size, 0, 6.2832);
        sctx.fillStyle = 'rgba(' + f.r[0] + ',' + f.r[1] + ',' + f.r[2] + ',' + a + ')';
        sctx.fill();
      });

      requestAnimationFrame(splashFrame);
    }
    requestAnimationFrame(splashFrame);
  })();

  /* ── Estrellas CSS de 4 puntas (decorativas alrededor de la mascota) ── */
  (function buildSparkles() {
    var wrap = document.getElementById('spSparkles');
    if (!wrap) return;
    var CX = 50, CY = 42; /* % */
    var COLORS = ['#FFD700','#00EEFF','#FF9940','#E080FF','#80FFD0','#fff'];
    var configs = [
      { angle:  20, dist: 140, size: 14, delay: 900,  dur: 2.8 },
      { angle: 100, dist: 150, size: 10, delay: 1050, dur: 3.4 },
      { angle: 195, dist: 135, size: 12, delay: 800,  dur: 2.5 },
      { angle: 270, dist: 145, size: 8,  delay: 1150, dur: 3.8 },
      { angle:  55, dist: 170, size: 9,  delay: 1300, dur: 2.9 },
      { angle: 155, dist: 165, size: 11, delay: 1000, dur: 3.1 },
      { angle: 310, dist: 155, size: 7,  delay: 1200, dur: 4.0 },
      { angle: 235, dist: 178, size: 13, delay: 750,  dur: 2.6 },
    ];
    configs.forEach(function (cfg, i) {
      var rad   = cfg.angle * Math.PI / 180;
      var x     = CX + Math.cos(rad) * (cfg.dist / window.innerWidth * 100);
      var y     = CY + Math.sin(rad) * (cfg.dist / window.innerHeight * 100);
      var el    = document.createElement('div');
      var color = COLORS[i % COLORS.length];
      el.className = 'sp-sparkle';
      el.style.cssText = [
        'left:'   + x + '%',
        'top:'    + y + '%',
        'width:'  + cfg.size + 'px',
        'height:' + cfg.size + 'px',
        'color:'  + color,
        'animation-delay:'    + cfg.delay + 'ms',
        'animation-duration:' + cfg.dur + 's',
      ].join(';');
      wrap.appendChild(el);
    });
  })();

  /* ── Letras animadas del título ── */
  (function buildTitle() {
    var container = document.getElementById('spLetters');
    if (!container) return;
    var text  = ['L','u','k','i','B','o','o','k','s'];
    var isOr  = [false,false,false,false,true,true,true,true,true];
    var BASE_DELAY = 820; /* ms desde carga */
    text.forEach(function (ch, i) {
      var span = document.createElement('span');
      span.className = 'sp-letter';
      if (isOr[i]) span.style.color = '#FF9940'; /* orange override sobre gradient */
      span.style.animationDelay = (BASE_DELAY + i * 65) + 'ms';
      span.textContent = ch;
      container.appendChild(span);
    });
  })();

  /* ── Tagline palabra por palabra ── */
  (function buildTagline() {
    var el = document.getElementById('spTagline');
    if (!el) return;
    var words = ['Donde','cada','libro','abre','un','mundo','de','posibilidades'];
    var BASE  = 1400;
    words.forEach(function (w, i) {
      var span = document.createElement('span');
      span.className = 'sp-word';
      span.style.animationDelay = (BASE + i * 90) + 'ms';
      span.textContent = w + (i < words.length - 1 ? '\u00A0' : '');
      el.appendChild(span);
    });
  })();

  /* ── Secuencia de reveals ── */
  function revealEl(id, delay) {
    setTimeout(function () {
      var el = document.getElementById(id);
      if (el) el.classList.add('reveal');
    }, delay);
  }

  revealEl('spMascotWrap', 280);
  revealEl('spTitleWrap',  820);
  revealEl('spProgWrap',  1550);

  /* ── Barra de progreso suave con rAF ── */
  var progStart = null;
  var PROG_DUR  = 2600;

  setTimeout(function () {
    var fill = document.getElementById('spFill');
    function progFrame(now) {
      if (!progStart) progStart = now;
      var raw = (now - progStart) / PROG_DUR;
      /* Ease: arranca rápido, se desacelera al final */
      var eased = raw < .8
        ? raw * 1.1
        : .88 + (raw - .8) * .6;
      var pct = Math.min(eased * 100, 100);
      if (fill) fill.style.width = pct + '%';
      if (raw < 1) requestAnimationFrame(progFrame);
    }
    requestAnimationFrame(progFrame);
  }, 1550);

  /* ────────────────────────────────────────────────────────────
     TRANSICIÓN SPLASH → LOGIN
     Fade + blur out / fade + slide in
  ──────────────────────────────────────────────────────────── */
  var transitioned = false;

  function doTransition() {
    if (transitioned) return;
    transitioned = true;

    var splash = document.getElementById('splash');
    var login  = document.getElementById('loginPage');

    /* 1. Splash exit */
    splash.classList.add('exit');

    /* 2. Login aparece con ligero delay para que se sienta como crossfade */
    setTimeout(function () {
      login.classList.add('show');
    }, 100);

    /* 3. Eliminar splash del DOM para liberar memoria */
    setTimeout(function () {
      if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      document.body.classList.add('ready');
    }, 850);
  }

  /* Trigger: 3.2s o cuando la página ya cargó completamente */
  var SPLASH_DURATION = 3200;
  var splashTimer = setTimeout(doTransition, SPLASH_DURATION);

  window.addEventListener('load', function () {
    /* Si la página carga muy rápido, esperar mínimo 2.8s para que se vea el splash */
    var elapsed = performance.now() - t0;
    var remaining = Math.max(2800 - elapsed, 0);
    clearTimeout(splashTimer);
    splashTimer = setTimeout(doTransition, remaining);
  });

  /* ────────────────────────────────────────────────────────────
     CONFIG DINÁMICA — logo y favicon desde API
  ──────────────────────────────────────────────────────────── */
  fetch(BASE + '/config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      if (!cfg) return;

      if (cfg.logo) {
        var img = '<img style="width:100%;height:100%;object-fit:contain" src="' + cfg.logo + '" alt="Logo">';
        var box = document.getElementById('lpLogoBox');
        var sp  = document.getElementById('spCircle');
        if (box) box.innerHTML = img;
        if (sp)  sp.innerHTML  = img;
      }

      if (cfg.favicon) {
        var fav = document.getElementById('dynFavicon');
        if (fav) fav.href = cfg.favicon;
      }
    })
    .catch(function () { /* logo local se mantiene */ });

  /* ────────────────────────────────────────────────────────────
     TOGGLE CONTRASEÑA
  ──────────────────────────────────────────────────────────── */
  var toggleBtn  = document.getElementById('togglePass');
  var passInput  = document.getElementById('inputPass');
  var passShown  = false;

  toggleBtn.addEventListener('click', function () {
    passShown      = !passShown;
    passInput.type = passShown ? 'text' : 'password';
    toggleBtn.innerHTML = passShown ? '&#128584;' : '&#128065;';
    toggleBtn.setAttribute('aria-label',
      passShown ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  /* ────────────────────────────────────────────────────────────
     FORMULARIO DE LOGIN
  ──────────────────────────────────────────────────────────── */
  var form    = document.getElementById('loginForm');
  var errBox  = document.getElementById('errBox');
  var btnEl   = document.getElementById('btnLogin');
  var userInp = document.getElementById('inputUser');

  /* ── Bloqueo por intentos fallidos ── */
  var MAX_ATTEMPTS  = 5;
  var LOCK_DURATION = 10 * 60 * 1000; /* 10 minutos en ms */
  var STORE_KEY     = 'biblio_login_lock';
  var countdownTimer = null;

  function getLockData() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
  }
  function saveLockData(d) {
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }
  function clearLockData() {
    localStorage.removeItem(STORE_KEY);
  }

  function isLocked() {
    var d = getLockData();
    if (!d.lockedUntil) return false;
    if (Date.now() < d.lockedUntil) return true;
    clearLockData();
    return false;
  }

  function remainingMs() {
    var d = getLockData();
    return d.lockedUntil ? Math.max(0, d.lockedUntil - Date.now()) : 0;
  }

  function registerFail() {
    var d = getLockData();
    d.attempts = (d.attempts || 0) + 1;
    if (d.attempts >= MAX_ATTEMPTS) {
      d.lockedUntil = Date.now() + LOCK_DURATION;
    }
    saveLockData(d);
    return d.attempts;
  }

  function fmtTime(ms) {
    var totalSec = Math.ceil(ms / 1000);
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function startLockCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    function tick() {
      var rem = remainingMs();
      if (rem <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        errBox.classList.remove('show');
        setFormLocked(false);
        clearLockData();
        return;
      }
      errBox.textContent = 'Demasiados intentos fallidos. Espere ' + fmtTime(rem) + ' para intentarlo de nuevo.';
      errBox.classList.add('show');
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function setFormLocked(locked) {
    userInp.disabled  = locked;
    passInput.disabled = locked;
    btnEl.disabled    = locked;
    if (locked) {
      btnEl.innerHTML = '&#128274; Acceso bloqueado';
    } else {
      btnEl.innerHTML = 'Iniciar sesi\u00F3n';
    }
  }

  /* Verificar bloqueo al cargar */
  if (isLocked()) {
    setFormLocked(true);
    startLockCountdown();
  }

  /* Limpiar error al escribir */
  [userInp, passInput].forEach(function (inp) {
    inp.addEventListener('input', function () {
      if (!isLocked()) {
        errBox.classList.remove('show');
        inp.classList.remove('shake');
      }
    });
  });

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');

    /* Shake en ambos inputs: forzar reflow para reiniciar animación */
    [userInp, passInput].forEach(function (inp) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
    });
    setTimeout(function () {
      [userInp, passInput].forEach(function (i) { i.classList.remove('shake'); });
    }, 500);
  }

  function setLoading(on) {
    btnEl.disabled = on;
    btnEl.innerHTML = on
      ? '<span class="btn-spinner"></span>Verificando\u2026'
      : 'Iniciar sesi\u00F3n';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errBox.classList.remove('show');

    if (isLocked()) {
      startLockCountdown();
      return;
    }

    var usuario  = userInp.value.trim();
    var password = passInput.value;

    if (!usuario || !password) {
      showErr('Ingrese usuario y contraseña para continuar');
      return;
    }

    setLoading(true);

    fetch(BASE + '/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ usuario: usuario, password: password })
    })
    .then(function (res) {
      return res.json().then(function (d) { return { ok: res.ok, d: d }; });
    })
    .then(function (r) {
      if (!r.ok) {
        var attempts = registerFail();
        if (isLocked()) {
          setFormLocked(true);
          startLockCountdown();
        } else {
          var remaining = MAX_ATTEMPTS - attempts;
          showErr((r.d.error || 'Credenciales incorrectas') +
            (remaining > 0 ? ' (' + remaining + ' intento' + (remaining === 1 ? '' : 's') + ' restante' + (remaining === 1 ? '' : 's') + ')' : ''));
          setLoading(false);
        }
        return;
      }
      /* Éxito: limpiar conteo */
      clearLockData();
      btnEl.innerHTML = '&#10003; Acceso concedido';
      btnEl.classList.add('success');
      btnEl.disabled  = true;
      localStorage.setItem('biblio_token', r.d.token);
      localStorage.setItem('biblio_user',  JSON.stringify(r.d.user));
      setTimeout(function () { location.href = 'index.html'; }, 680);
    })
    .catch(function () {
      showErr('Error de conexión. Verifique que el servidor esté activo.');
      setLoading(false);
    });
  });

})();
</script>
</body>
</html>
