<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuKiBooks — Biblioteca Escolar</title>
  <link rel="icon" href="https://www.mep.go.cr/favicon.ico" id="dynFavicon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ─────────────────────────────────────────────
       BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #00071A;
      -webkit-font-smoothing: antialiased;
    }
    body.ready { overflow-y: auto; }

    /* ─────────────────────────────────────────────
       CANVAS — siempre visible, detrás de todo
    ───────────────────────────────────────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────
       SPLASH MÁGICO
    ───────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      overflow: hidden;
      will-change: opacity, filter;
      transition: opacity .9s cubic-bezier(.4,0,.2,1),
                  filter   .9s cubic-bezier(.4,0,.2,1);
    }
    /* Contenedor de texto en la parte inferior */
    #spContent {
      position: absolute;
      bottom: 7vh; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0;
      z-index: 2; width: 100%;
    }
    #splash.exit {
      opacity: 0;
      filter: blur(22px) scale(1.06) brightness(2.2);
      pointer-events: none;
      transition: opacity 1.15s cubic-bezier(.4,0,.2,1),
                  filter  1.15s cubic-bezier(.4,0,.2,1);
    }

    /* Canvas mágico exclusivo del splash */
    #spCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── SISTEMA SOLAR (dibujado en canvas) ── */


    /* ── TÍTULO ── */
    #spTitleWrap {
      z-index: 2;
      text-align: center;
      opacity: 0;
      will-change: opacity;
      transition: opacity .5s ease;
      margin-bottom: 14px;
      pointer-events: none;
    }
    #spTitleWrap.reveal { opacity: 1; }

    .sp-title-main {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      /* Gradiente animado sobre el texto */
      background: linear-gradient(135deg,
        #ffffff 0%,
        #e0f0ff 20%,
        #ffffff 38%,
        #FFD700 50%,
        #FF9940 62%,
        #ffffff 80%,
        #d0e8ff 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: title-shimmer 4s ease-in-out infinite;
    }
    @keyframes title-shimmer {
      0%   { background-position: 100% 0; }
      50%  { background-position:   0% 0; }
      100% { background-position: 100% 0; }
    }

    /* Letras individuales — pop en secuencia */
    .sp-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(24px) scale(.7);
      will-change: opacity, transform;
      animation: letter-pop .6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes letter-pop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .sp-mep {
      margin-top: 10px;
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(255,255,255,.28);
      text-transform: uppercase;
      letter-spacing: .2em;
      opacity: 0;
      animation: fade-up .7s ease .9s forwards;
    }
    @keyframes fade-up {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── TAGLINE — palabra por palabra ── */
    #spTagline {
      z-index: 2;
      text-align: center;
      font-size: 15px;
      font-style: italic;
      color: rgba(255,255,255,.55);
      max-width: 320px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .sp-word {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) blur(4px);
      animation: word-in .55s cubic-bezier(.22,1,.36,1) forwards;
    }
    /* filter: blur() no es animable directamente, usamos filter como propiedad */
    @keyframes word-in {
      from { opacity:0; transform: translateY(10px); filter: blur(4px); }
      to   { opacity:1; transform: translateY(0);    filter: blur(0); }
    }

    /* ── PROGRESS ── */
    #spProgWrap {
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity .5s ease;
    }
    #spProgWrap.reveal { opacity: 1; }
    .sp-prog-track {
      width: 160px; height: 2px;
      background: rgba(255,255,255,.07);
      border-radius: 99px;
      overflow: visible;
      position: relative;
    }
    #spFill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      position: relative;
      background: linear-gradient(90deg,
        rgba(100,60,255,.6) 0%,
        rgba(0,180,255,.9) 45%,
        #FFD700 100%
      );
      box-shadow: 0 0 8px rgba(0,200,255,.5);
      transition: width .1s linear;
    }
    /* Punto brillante en la punta del progreso */
    #spFill::after {
      content: '';
      position: absolute;
      right: -3px; top: 50%;
      transform: translateY(-50%);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px #fff, 0 0 16px rgba(0,220,255,.8);
    }
    .sp-prog-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,.2);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────────
       LOGIN PAGE
    ───────────────────────────────────────────── */
    #loginPage {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
      transition: opacity .65s ease;
    }
    #loginPage.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Glass card */
    .lp-card {
      position: relative;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.055);
      backdrop-filter: blur(44px) saturate(1.6);
      -webkit-backdrop-filter: blur(44px) saturate(1.6);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      padding: 48px 42px;
      box-shadow:
        0 48px 120px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04),
        inset 0 1px 0 rgba(255,255,255,.08);
      overflow: hidden;
      transform: translateY(28px);
      will-change: transform;
      transition: transform .75s cubic-bezier(.22,1,.36,1);
    }
    #loginPage.show .lp-card { transform: translateY(0); }

    /* Inner glow blobs (decorative) */
    .lp-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(40px);
    }
    .lp-blob-1 {
      width: 260px; height: 260px;
      top: -100px; left: -80px;
      background: radial-gradient(circle, rgba(0,70,200,.14), transparent 70%);
    }
    .lp-blob-2 {
      width: 200px; height: 200px;
      bottom: -80px; right: -60px;
      background: radial-gradient(circle, rgba(255,80,0,.08), transparent 70%);
    }

    /* Card content above blobs */
    .lp-inner { position: relative; z-index: 1; }

    /* Logo */
    .lp-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .lp-logo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .lp-logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 108px; height: 108px;
      position: relative;
      background: #fff;
      border-radius: 50%;
      overflow: visible;
      animation: logo-float 4s ease-in-out infinite;
      box-shadow: 0 0 0 2px rgba(0,220,255,.95), 0 0 10px 3px rgba(0,200,255,.7), 0 0 22px 6px rgba(0,160,255,.4), 0 0 45px 10px rgba(0,100,255,.2), 0 10px 30px rgba(0,0,0,.5);
    }
    @keyframes logo-float {
      0%,100% { transform: translateY(0);   }
      50%      { transform: translateY(-7px); }
    }
    .lp-logo-box::before, .lp-logo-box::after { display: none; }

    /* Contenedor circular interior — recorta y rellena */
    .lp-logo-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .lp-logo-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Nombre de marca */
    .lp-brand {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: .5px;
      background: linear-gradient(135deg, #fff 30%, #88d8ff 65%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer-brand 4s linear infinite;
      text-shadow: none;
    }
    @keyframes shimmer-brand {
      0%   { background-position: 200% center; }
      100% { background-position:   0% center; }
    }
    .lp-brand .or {
      background: linear-gradient(135deg, #FFB347, #FF7A00, #FFD080);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer-brand 3s linear infinite reverse;
    }
    .lp-brand-sub {
      margin-top: 5px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,.38);
      text-transform: uppercase;
      letter-spacing: .18em;
      text-shadow: 0 0 12px rgba(0,180,255,.3);
    }

    /* Heading */
    .lp-heading { margin-bottom: 26px; }
    .lp-heading-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .lp-heading-sub {
      font-size: 13px;
      color: rgba(255,255,255,.38);
    }

    /* Error box */
    .lp-err {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,60,60,.1);
      border: 1px solid rgba(255,80,80,.22);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,160,160,.95);
      animation: err-in .3s cubic-bezier(.22,1,.36,1);
    }
    .lp-err.show { display: block; }
    @keyframes err-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Field group */
    .fg { margin-bottom: 18px; }
    .fl {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
      margin-bottom: 8px;
    }
    .fi-wrap { position: relative; }

    /* Input */
    .fi {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 46px 14px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      color: #fff;
      outline: none;
      will-change: border-color, box-shadow;
      transition: background .25s, border-color .25s, box-shadow .25s;
    }
    .fi::placeholder { color: rgba(255,255,255,.2); }
    .fi:focus {
      background: rgba(255,255,255,.09);
      border-color: rgba(0,180,255,.6);
      box-shadow: 0 0 0 3px rgba(0,160,255,.12),
                  0 0 28px rgba(0,120,255,.07);
    }
    /* Shake on error — added/removed by JS */
    .fi.shake {
      border-color: rgba(255,80,80,.65);
      animation: shake .45s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%,54%  { transform: translateX(-8px); }
      36%,72%  { transform: translateX(8px); }
    }

    /* Input icon */
    .fi-ico {
      position: absolute;
      right: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: .3;
      pointer-events: none;
    }
    /* Toggle password button */
    .fi-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: rgba(255,255,255,.35);
      padding: 5px;
      line-height: 1;
      transition: color .2s;
    }
    .fi-toggle:hover { color: rgba(255,255,255,.7); }

    /* Submit button */
    .btn-login {
      width: 100%;
      margin-top: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #003DA5 0%, #1558CC 50%, #003DA5 100%);
      background-size: 200% 100%;
      will-change: background-position, box-shadow, transform;
      transition:
        background-position .45s ease,
        box-shadow .3s ease,
        transform .15s ease;
    }
    /* Shimmer layer */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,.18) 45%,
        rgba(255,255,255,.22) 50%,
        rgba(255,255,255,.18) 55%,
        transparent 100%);
      transform: translateX(-110%) skewX(-20deg);
      transition: transform 0s;
    }
    .btn-login:hover:not(:disabled) {
      background-position: 100% 0;
      box-shadow: 0 14px 40px rgba(0,61,165,.45),
                  0 4px 12px rgba(0,80,200,.28);
      transform: translateY(-1px);
    }
    .btn-login:hover:not(:disabled)::before {
      animation: shimmer .6s ease-in-out forwards;
    }
    @keyframes shimmer {
      to { transform: translateX(140%) skewX(-20deg); }
    }
    .btn-login:active:not(:disabled) {
      transform: scale(.985);
      box-shadow: 0 4px 16px rgba(0,61,165,.3);
    }
    .btn-login:disabled { opacity: .68; cursor: not-allowed; }
    .btn-login.success {
      background: linear-gradient(135deg, #0A6640, #1B8050) !important;
      background-position: 0 0 !important;
      box-shadow: 0 14px 40px rgba(10,102,64,.4) !important;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .lp-footer {
      margin-top: 26px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,.17);
      letter-spacing: .05em;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */

    /* Título: fluido entre 32px (320px) y 56px (800px+) */
    .sp-title-main { font-size: clamp(32px, 8vw, 56px); letter-spacing: clamp(-1px, -0.3vw, -2px); }

    /* Tagline: no overflow en pantallas estrechas */
    #spTagline { max-width: min(320px, 88vw); font-size: clamp(12px, 3.5vw, 15px); margin-bottom: clamp(16px, 4vw, 28px); }

    /* MEP subtitle */
    .sp-mep { font-size: clamp(8px, 2.2vw, 10.5px); letter-spacing: clamp(.08em, .4vw, .2em); }

    /* Contenido splash: usar dvh en móvil para evitar que barra del browser tape */
    #spContent { bottom: max(4vh, 16px); padding: 0 20px; width: 100%; }

    /* Barra de progreso */
    .sp-prog-track { width: clamp(120px, 40vw, 160px); }

    @media (max-width: 600px) {
      .lp-card        { padding: 32px 20px; border-radius: 20px; }
      .lp-heading-title { font-size: 22px; }
      .lp-logo-box    { width: 88px; height: 88px; }
      .lp-brand       { font-size: 22px; }
    }

    @media (max-width: 380px) {
      .lp-card        { padding: 28px 16px; border-radius: 18px; }
      .lp-heading-title { font-size: 20px; }
      .lp-logo-box    { width: 76px; height: 76px; }
    }

    /* Landscape móvil: solar system más pequeño, texto compacto */
    @media (max-height: 500px) and (orientation: landscape) {
      #spContent      { bottom: max(2vh, 8px); }
      #spTagline      { display: none; }
      .sp-mep         { display: none; }
      .sp-prog-track  { width: 120px; }
    }

  </style>
</head>
<body>

<!-- ── Canvas (fondo siempre vivo) ── -->
<canvas id="bgCanvas"></canvas>

<!-- ══════════════════════════════════════════════════
     SPLASH MÁGICO
══════════════════════════════════════════════════ -->
<div id="splash">

  <!-- Sistema solar animado en canvas -->
  <canvas id="spCanvas"></canvas>

  <!-- Texto: título + tagline + progreso (abajo) -->
  <div id="spContent">
    <div id="spTitleWrap">
      <div class="sp-title-main" id="spLetters"></div>
      <div class="sp-mep">Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica</div>
    </div>
    <div id="spTagline"></div>
    <div id="spProgWrap">
      <div class="sp-prog-track">
        <div id="spFill"></div>
      </div>
      <div class="sp-prog-label">Cargando sistema&hellip;</div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════ -->
<div id="loginPage">
  <div class="lp-card">
    <div class="lp-blob lp-blob-1"></div>
    <div class="lp-blob lp-blob-2"></div>

    <div class="lp-inner">

      <!-- Logo -->
      <div class="lp-logo">
        <div class="lp-logo-wrap">
          <div class="lp-logo-box" id="lpLogoBox">
            <div class="lp-logo-inner">
              <img src="img/logo.png" alt="LuKiBooks" style="width:100%;height:100%;object-fit:cover;display:block"
                   onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:30px>📚</span>'">
            </div>
          </div>
        </div>
        <div class="lp-brand">Luki<span class="or">Books</span></div>
        <div class="lp-brand-sub">Biblioteca Escolar &middot; MEP</div>
      </div>

      <!-- Encabezado -->
      <div class="lp-heading">
        <div class="lp-heading-title">Bienvenido</div>
        <div class="lp-heading-sub">Ingrese sus credenciales para acceder</div>
      </div>

      <!-- Error -->
      <div class="lp-err" id="errBox" role="alert"></div>

      <!-- Formulario -->
      <form id="loginForm" novalidate>
        <div class="fg">
          <label class="fl" for="inputUser">Usuario</label>
          <div class="fi-wrap">
            <input class="fi" type="text" id="inputUser"
                   placeholder="Ingrese su usuario"
                   autocomplete="username" required>
            <span class="fi-ico" aria-hidden="true">&#128100;</span>
          </div>
        </div>
        <div class="fg">
          <label class="fl" for="inputPass">Contrase&ntilde;a</label>
          <div class="fi-wrap">
            <input class="fi" type="password" id="inputPass"
                   placeholder="Ingrese su contrase&ntilde;a"
                   autocomplete="current-password" required>
            <button type="button" class="fi-toggle" id="togglePass"
                    aria-label="Mostrar contrase&ntilde;a">&#128065;</button>
          </div>
        </div>
        <button class="btn-login" type="submit" id="btnLogin">
          Iniciar sesi&oacute;n
        </button>
      </form>

      <div class="lp-footer">
        LuKiBooks v3.0 &mdash; Ministerio de Educaci&oacute;n P&uacute;blica &middot; Costa Rica
      </div>

    </div>
  </div>
</div>

<script>
/* ================================================================
   LuKiBooks — Splash + Login
   Single-file, zero dependencies, 60fps
================================================================ */
(function () {
  'use strict';

  /* ── Config ── */
  var isLocal = location.hostname === 'localhost'
             || location.hostname === '127.0.0.1';
  var BASE = isLocal
    ? 'http://localhost:3000/api'
    : 'https://biblioapp-nclh.onrender.com/api';

  /* Redirect si ya hay sesión */
  if (localStorage.getItem('biblio_token')) {
    location.href = 'index.html';
    return;
  }

  /* ────────────────────────────────────────────────────────────
     CANVAS — Universo espacial realista: 60fps, parallax, nebulosas
  ──────────────────────────────────────────────────────────── */
  var canvas = document.getElementById('bgCanvas');
  var ctx    = canvas.getContext('2d');
  var W, H, t0 = performance.now();
  var mouseX = 0, mouseY = 0, mTX = 0, mTY = 0;

  function resizeCanvas() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    mTX = mouseX = W * .5;
    mTY = mouseY = H * .5;
    buildStars(); /* reconstruir al resize */
  }

  document.addEventListener('mousemove', function (e) { mTX = e.clientX; mTY = e.clientY; });
  window.addEventListener('resize', resizeCanvas);

  /* ── Estrellas: 3 capas de profundidad (parallax real) ── */
  var STAR_LAYERS = [];

  function buildStars() {
    var mob = W < 600;
    STAR_LAYERS = [
      /* Capa lejana: muchas, pequeñas, lentas */
      buildLayer(mob ? 130 : 280, .15, 1.1,  .003),
      /* Capa media */
      buildLayer(mob ?  60 : 130, .5,  1.8,  .008),
      /* Capa cercana: pocas, grandes, rápidas */
      buildLayer(mob ?  18 :  40, .9,  2.8,  .018),
    ];
  }

  function buildLayer(count, baseAlpha, maxSize, parallaxFactor) {
    var stars = [];
    for (var i = 0; i < count; i++) {
      var size = Math.random() * maxSize + .3;
      stars.push({
        x:    Math.random(),
        y:    Math.random(),
        size: size,
        alpha: baseAlpha * (.4 + Math.random() * .6),
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpd:   Math.random() * .0028 + .0008,
        /* Color: mayoría blancas, algunas azul-hielo, pocas cálidas */
        r: 255,
        g: Math.random() > .85 ? 200 + Math.floor(Math.random()*55) : 255,
        b: Math.random() > .7  ? 220 + Math.floor(Math.random()*35) : 255,
        px: parallaxFactor,
      });
    }
    return stars;
  }

  /* ── Nebulosas: capas de color profundo con parallax lento ── */
  var NEBULAE = [
    /* Nebulosa azul-violeta arriba-izquierda */
    { bx:.08, by:.12, rx:480, ry:320, rgb:[30,60,200],  a:.13, px:.006, py:.005, phase:0,   spd:.00018 },
    /* Nebulosa azul cian arriba-derecha */
    { bx:.85, by:.08, rx:360, ry:260, rgb:[0,120,240],  a:.09, px:.004, py:.003, phase:2.1, spd:.00022 },
    /* Nebulosa índigo centro */
    { bx:.5,  by:.45, rx:520, ry:380, rgb:[10,20,110],  a:.10, px:.003, py:.002, phase:4.5, spd:.00014 },
    /* Nebulosa naranja-rojo (estrella lejana) abajo-derecha */
    { bx:.82, by:.82, rx:300, ry:220, rgb:[180,50,10],  a:.06, px:.007, py:.006, phase:1.3, spd:.00026 },
    /* Nebulosa violeta abajo-izquierda */
    { bx:.15, by:.78, rx:340, ry:250, rgb:[80,20,180],  a:.07, px:.005, py:.004, phase:3.7, spd:.00019 },
    /* Nebulosa cyan pálida (tenue, grande) */
    { bx:.42, by:.18, rx:400, ry:300, rgb:[0,180,220],  a:.05, px:.002, py:.002, phase:5.2, spd:.00012 },
  ];

  /* ── Partículas flotantes (luciérnagas — capa viva del fondo) ── */
  var BGFLIES = (function () {
    var arr = [];
    var COLS = [
      [255, 220,  50],  /* dorado */
      [  0, 240, 255],  /* cian */
      [255, 255, 255],  /* blanco */
      [200,  80, 255],  /* magenta */
      [  0, 255, 130],  /* lima */
      [100, 160, 255],  /* azul suave */
    ];
    for (var i = 0; i < 90; i++) {
      var col = COLS[Math.floor(Math.random() * COLS.length)];
      arr.push({
        /* Posición base aleatoria en toda la pantalla */
        ox: Math.random(),
        oy: Math.random(),
        /* Oscilación independiente en X e Y */
        ax: Math.random() * Math.PI * 2,
        ay: Math.random() * Math.PI * 2,
        fx: Math.random() * .00045 + .00015,
        fy: Math.random() * .00045 + .00020,
        rx: Math.random() * 55 + 20,   /* radio oscilación x */
        ry: Math.random() * 40 + 15,   /* radio oscilación y */
        /* Movimiento de deriva lenta (drift) */
        dx: (Math.random() - .5) * .000012,
        dy: (Math.random() - .5) * .000008,
        /* Apariencia */
        r: col,
        sz:  Math.random() * 1.6 + .5,
        alp: Math.random() * .5 + .15,
        /* Pulso de brillo propio */
        pulsePhase: Math.random() * Math.PI * 2,
        pulseSpd:   Math.random() * .0012 + .0004,
      });
    }
    return arr;
  })();

  function drawBgFlies(t, now) {
    BGFLIES.forEach(function (f) {
      /* Drift lento — posición base se mueve muy despacio */
      f.ox += f.dx;
      f.oy += f.dy;
      /* Wrap alrededor de la pantalla */
      if (f.ox < -.05) f.ox = 1.05;
      if (f.ox > 1.05) f.ox = -.05;
      if (f.oy < -.05) f.oy = 1.05;
      if (f.oy > 1.05) f.oy = -.05;

      /* Posición con oscilación orgánica */
      var px = f.ox * W + Math.sin(now * f.fx + f.ax) * f.rx;
      var py = f.oy * H + Math.cos(now * f.fy + f.ay) * f.ry;

      /* Pulso de brillo */
      var pulse = Math.sin(t * f.pulseSpd * 1000 + f.pulsePhase) * .5 + .5;
      var al    = f.alp * (.5 + .5 * pulse);
      var sz    = f.sz  * (.85 + .15 * pulse);

      var c = f.r;
      /* Halo exterior difuso */
      var g = ctx.createRadialGradient(px, py, 0, px, py, sz * 5.5);
      g.addColorStop(0,   'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (al * .9) + ')');
      g.addColorStop(.35, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (al * .35) + ')');
      g.addColorStop(1,   'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
      ctx.beginPath();
      ctx.arc(px, py, sz * 5.5, 0, 6.2832);
      ctx.fillStyle = g;
      ctx.fill();

      /* Núcleo brillante */
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, 6.2832);
      ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + Math.min(al * 1.8, 1) + ')';
      ctx.fill();
    });
  }

  /* ── Planeta (esfera realista con gradiente 3D) ── */
  var PLANET = {
    bx: .82, by: .15,       /* posición base relativa */
    r:  W > 768 ? 68 : 0,   /* radio (0 en móvil pequeño) */
    px: .022, py: .018,
    ringAngle: -0.28,        /* inclinación del anillo en radianes */
  };

  /* ── Shooting stars ── */
  var SHOOTS = [];
  function spawnShoot() {
    var edge = Math.random();
    SHOOTS.push({
      x:    edge * W,
      y:    Math.random() * H * .5,
      len:  Math.random() * 120 + 60,
      spd:  Math.random() * 6 + 5,
      ang:  Math.PI / 4 + (Math.random() - .5) * .4,
      alpha: 0,
      life:  0,
      maxLife: Math.random() * 40 + 30,
    });
  }
  /* Shoot star timer */
  var lastShoot = 0;
  var nextShootDelay = 3000 + Math.random() * 5000;

  /* ── Draw nebula with elliptical gradient ── */
  function drawNebula(o, t, mx, my) {
    var pulse = Math.sin(t * o.spd * 1000 + o.phase) * .08;
    var ox = o.bx * W - mx * W * o.px;
    var oy = o.by * H - my * H * o.py;
    var rx = o.rx * (1 + pulse);
    var ry = o.ry * (1 + pulse * .7);
    var al = o.a + pulse * .02;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(1, ry / rx);
    var g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
    g.addColorStop(0,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + (al * 1.4) + ')');
    g.addColorStop(.35, 'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',' + al + ')');
    g.addColorStop(1,   'rgba(' + o.rgb[0] + ',' + o.rgb[1] + ',' + o.rgb[2] + ',0)');
    ctx.beginPath();
    ctx.arc(0, 0, rx, 0, 6.2832);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  /* ── Draw planet ── */
  function drawPlanet(mx, my, t) {
    var pr = PLANET.r;
    if (pr <= 0) return;
    var px = PLANET.bx * W - mx * W * PLANET.px;
    var py = PLANET.by * H - my * H * PLANET.py;

    /* Sombra difusa detrás del planeta */
    var shadow = ctx.createRadialGradient(px, py, pr * .6, px, py, pr * 2.2);
    shadow.addColorStop(0, 'rgba(0,20,80,.22)');
    shadow.addColorStop(1, 'rgba(0,20,80,0)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 2.2, 0, 6.2832);
    ctx.fillStyle = shadow;
    ctx.fill();

    /* Cuerpo del planeta — gradiente esférico 3D */
    var light = ctx.createRadialGradient(
      px - pr * .32, py - pr * .3, pr * .08,
      px, py, pr
    );
    light.addColorStop(0,   'rgba(80,140,255, .95)');
    light.addColorStop(.35, 'rgba(30,70,200,  .92)');
    light.addColorStop(.72, 'rgba(10,30,130,  .96)');
    light.addColorStop(1,   'rgba(2,8,60,     1)');
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, 6.2832);
    ctx.fillStyle = light;
    ctx.fill();

    /* Brillo atmosférico en el borde */
    var atm = ctx.createRadialGradient(px, py, pr * .82, px, py, pr * 1.14);
    atm.addColorStop(0, 'rgba(80,180,255,0)');
    atm.addColorStop(.6, 'rgba(60,160,255,.09)');
    atm.addColorStop(1, 'rgba(30,100,255,.18)');
    ctx.beginPath();
    ctx.arc(px, py, pr * 1.14, 0, 6.2832);
    ctx.fillStyle = atm;
    ctx.fill();

    /* Anillo — elipse inclinada con clip para ocultar la parte trasera */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);

    /* Parte trasera del anillo (detrás del planeta) */
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, Math.PI, 0);
    ctx.strokeStyle = 'rgba(180,210,255,.28)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(120,170,255,.15)';
    ctx.lineWidth = 14;
    ctx.stroke();

    /* Clip al círculo del planeta para tapar la parte del anillo que cruza */
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.clip();
    ctx.clearRect(-pr, -pr, pr * 2, pr * 2);

    /* Redibuja planeta encima del clip para no borrarlo */
    var light2 = ctx.createRadialGradient(
      -pr * .32, -pr * .3, pr * .08, 0, 0, pr
    );
    light2.addColorStop(0,   'rgba(80,140,255,.95)');
    light2.addColorStop(.35, 'rgba(30,70,200, .92)');
    light2.addColorStop(.72, 'rgba(10,30,130, .96)');
    light2.addColorStop(1,   'rgba(2,8,60,    1)');
    ctx.beginPath();
    ctx.arc(0, 0, pr, 0, 6.2832);
    ctx.fillStyle = light2;
    ctx.fill();
    ctx.restore();

    /* Parte delantera del anillo (delante del planeta) */
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(PLANET.ringAngle);
    ctx.beginPath();
    ctx.ellipse(0, 0, pr * 2.1, pr * .38, 0, 0, Math.PI);
    ctx.strokeStyle = 'rgba(200,225,255,.35)';
    ctx.lineWidth = 7;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(160,200,255,.18)';
    ctx.lineWidth = 14;
    ctx.stroke();
    ctx.restore();
  }

  /* ── Draw shooting star ── */
  function drawShoot(s) {
    var ex = s.x + Math.cos(s.ang) * s.len;
    var ey = s.y + Math.sin(s.ang) * s.len;
    var g = ctx.createLinearGradient(s.x, s.y, ex, ey);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(.6, 'rgba(200,230,255,' + s.alpha * .7 + ')');
    g.addColorStop(1, 'rgba(255,255,255,' + s.alpha + ')');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    /* Punta brillante */
    ctx.beginPath();
    ctx.arc(ex, ey, 1.2, 0, 6.2832);
    ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
    ctx.fill();
  }

  /* ── Main loop ── */
  function frame(now) {
    var t   = (now - t0) * .001;
    var dt  = now - (frame._last || now);
    frame._last = now;

    /* Smooth mouse lerp */
    mouseX += (mTX - mouseX) * .035;
    mouseY += (mTY - mouseY) * .035;
    var mx = (mouseX / W - .5);
    var my = (mouseY / H - .5);

    /* Fondo: negro espacio profundo */
    ctx.fillStyle = '#00020E';
    ctx.fillRect(0, 0, W, H);

    /* 1. Nebulosas (capa más profunda) */
    NEBULAE.forEach(function (o) { drawNebula(o, t, mx, my); });

    /* 2. Estrellas por capa (parallax diferencial) */
    STAR_LAYERS.forEach(function (layer) {
      layer.forEach(function (s) {
        var tw = Math.sin(t * s.twinkleSpd * 1000 + s.twinklePhase);
        /* Twinkle: varía alpha y tamaño levemente */
        var a  = s.alpha * (.65 + .35 * (tw * .5 + .5));
        var sz = s.size  * (.88 + .12 * (tw * .5 + .5));
        /* Parallax: estrellas lejanas se mueven menos */
        var sx = s.x * W - mx * W * s.px;
        var sy = s.y * H - my * H * s.px;

        /* Estrellas grandes: pequeño halo de difracción */
        if (sz > 1.8) {
          ctx.beginPath();
          ctx.arc(sx, sy, sz * 2.4, 0, 6.2832);
          ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + (a * .12) + ')';
          ctx.fill();
          /* Rayos de difracción (estrellas muy brillantes) */
          if (sz > 2.2) {
            ctx.save();
            ctx.globalAlpha = a * .18;
            ctx.strokeStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',1)';
            ctx.lineWidth = .6;
            for (var ang = 0; ang < 4; ang++) {
              var ra = ang * Math.PI / 4 + t * .08;
              ctx.beginPath();
              ctx.moveTo(sx + Math.cos(ra) * sz, sy + Math.sin(ra) * sz);
              ctx.lineTo(sx + Math.cos(ra) * sz * 5, sy + Math.sin(ra) * sz * 5);
              ctx.stroke();
            }
            ctx.restore();
          }
        }

        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, 6.2832);
        ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + a + ')';
        ctx.fill();
      });
    });

    /* 3. Planeta */
    drawPlanet(mx, my, t);

    /* 4. Partículas flotantes (luciérnagas de fondo) */
    drawBgFlies(t, now);

    /* 5. Shooting stars */
    if (now - lastShoot > nextShootDelay) {
      spawnShoot();
      lastShoot      = now;
      nextShootDelay = 1800 + Math.random() * 3500;
    }
    for (var i = SHOOTS.length - 1; i >= 0; i--) {
      var s = SHOOTS[i];
      s.life++;
      /* Fade in/out sobre el ciclo de vida */
      var progress = s.life / s.maxLife;
      s.alpha = progress < .25
        ? progress / .25
        : 1 - (progress - .25) / .75;
      s.alpha = Math.max(0, Math.min(1, s.alpha)) * .85;
      s.x += Math.cos(s.ang) * s.spd;
      s.y += Math.sin(s.ang) * s.spd;
      drawShoot(s);
      if (s.life >= s.maxLife) SHOOTS.splice(i, 1);
    }

    requestAnimationFrame(frame);
  }

  resizeCanvas();
  requestAnimationFrame(frame);

  /* ────────────────────────────────────────────────────────────
     SPLASH MÁGICO — secuencia cinematográfica por capas
  ──────────────────────────────────────────────────────────── */

  /* ── Sistema Solar — neón, estelas, nebulosas, fugaces ── */
  (function initSolarSystem() {
    var sc  = document.getElementById('spCanvas');
    if (!sc) return;
    var ctx = sc.getContext('2d');
    var W, H, CX, CY, SC;

    function resize() {
      W = sc.width  = window.innerWidth;
      H = sc.height = window.innerHeight;
      CX = W * 0.5;
      /* En portrait móvil subimos el centro para dar espacio al texto inferior */
      CY = H * (W < 600 ? 0.36 : 0.38);
      /* Escala el sistema solar para que el planeta más lejano (Saturno orb=272)
         siempre quepa dentro de la pantalla con un margen del 10% */
      SC = Math.min(1.0, (Math.min(W, H) * 0.44) / 272);
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Estrellas: normales + sparkle 4 puntas ── */
    var STARS = [];
    var starCount = window.innerWidth < 600 ? 110 : 260;
    for (var si = 0; si < starCount; si++) {
      var big = Math.random() > 0.91;
      STARS.push({
        x: Math.random(), y: Math.random(),
        r: big ? Math.random() * 1.4 + 0.8 : Math.random() * 0.9 + 0.15,
        base:  Math.random() * 0.50 + 0.10,
        phase: Math.random() * 6.2832,
        spd:   Math.random() * 1.6 + 0.4,
        sparkle: big && Math.random() > 0.45,
        arms:    Math.random() * 4 + 3,
      });
    }

    /* ── Nebulosas de fondo ── */
    var NEBULAE = [
      { x: 0.15, y: 0.20, r: 220, c: [90,20,190]  },
      { x: 0.82, y: 0.14, r: 195, c: [0,55,170]   },
      { x: 0.88, y: 0.72, r: 240, c: [190,35,65]  },
      { x: 0.10, y: 0.68, r: 175, c: [0,130,80]   },
      { x: 0.50, y: 0.08, r: 160, c: [40,100,200] },
    ];

    /* ── Planetas ── col=base, neon=brillo neón ── */
    var TILT = 0.36;
    var PLANETS = [
      { orb: 55,  sz: 5,  col:[200,155,75],  neon:[255,200,80],  spd:1.90, phase:0.3,  trail:[]                   },
      { orb: 90,  sz: 9,  col:[255,215,35],  neon:[255,245,90],  spd:1.10, phase:1.8,  trail:[]                   },
      { orb: 128, sz: 10, col:[28,115,255],  neon:[80,185,255],  spd:0.66, phase:3.1,  trail:[], moon:true         },
      { orb: 168, sz: 7,  col:[255,52,22],   neon:[255,110,60],  spd:0.40, phase:4.6,  trail:[]                   },
      { orb: 216, sz: 19, col:[215,150,75],  neon:[255,190,90],  spd:0.19, phase:1.2,  trail:[], bands:true        },
      { orb: 272, sz: 13, col:[232,208,118], neon:[255,245,150], spd:0.11, phase:3.8,  trail:[], rings:true        },
    ];

    /* ── Estrellas fugaces ── */
    var SHOOTS = [];
    var lastShoot = -6;

    var t0 = performance.now();

    /* ──────────────────────── FRAME LOOP ──────────────────────── */
    function frame(now) {
      if (!document.getElementById('splash')) return;
      var t = (now - t0) * 0.001;
      ctx.clearRect(0, 0, W, H);

      drawNebulae();
      drawStars(t);
      manageShoots(t);

      /* Sistema solar: escalado para caber en cualquier pantalla */
      ctx.save();
      ctx.translate(CX, CY);
      ctx.scale(SC, SC);
      ctx.translate(-CX, -CY);

      drawOrbits();

      var items = buildItems(t);

      /* Detrás del sol */
      var beh = items.filter(function(it){ return it.behind; });
      beh.sort(function(a,b){ return b.y - a.y; });
      beh.forEach(function(it){ drawTrail(it, 0.55); drawPlanet(it, 0.55); });

      drawSun(t);

      /* Frente al sol */
      var fro = items.filter(function(it){ return !it.behind; });
      fro.sort(function(a,b){ return a.y - b.y; });
      fro.forEach(function(it){ drawTrail(it, 1.0); drawPlanet(it, 1.0); });

      ctx.restore();

      requestAnimationFrame(frame);
    }

    /* ── Nebulosas ── */
    function drawNebulae() {
      NEBULAE.forEach(function(n) {
        var nx = n.x * W, ny = n.y * H;
        var g  = ctx.createRadialGradient(nx, ny, 0, nx, ny, n.r);
        g.addColorStop(0,   'rgba('+n.c[0]+','+n.c[1]+','+n.c[2]+',0.065)');
        g.addColorStop(0.5, 'rgba('+n.c[0]+','+n.c[1]+','+n.c[2]+',0.022)');
        g.addColorStop(1,   'rgba('+n.c[0]+','+n.c[1]+','+n.c[2]+',0)');
        ctx.beginPath(); ctx.arc(nx, ny, n.r, 0, 6.2832);
        ctx.fillStyle = g; ctx.fill();
      });
    }

    /* ── Estrellas ── */
    function drawStars(t) {
      STARS.forEach(function(s) {
        var a  = s.base + 0.24 * Math.sin(t * s.spd + s.phase);
        var sx = s.x * W, sy = s.y * H;
        if (s.sparkle) {
          ctx.save(); ctx.translate(sx, sy);
          ctx.rotate(t * 0.12 + s.phase);
          ctx.strokeStyle = 'rgba(255,255,255,' + (a * 0.9) + ')';
          ctx.lineWidth = 0.7;
          var armLen = s.arms + 1.8 * Math.sin(t * 1.1 + s.phase);
          for (var arm = 0; arm < 4; arm++) {
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, armLen); ctx.stroke();
            ctx.rotate(Math.PI / 2);
          }
          ctx.restore();
          ctx.beginPath(); ctx.arc(sx, sy, 0.85, 0, 6.2832);
          ctx.fillStyle = 'rgba(255,255,255,' + Math.min(a*1.5, 1) + ')'; ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, 6.2832);
          ctx.fillStyle = 'rgba(255,255,255,' + a + ')'; ctx.fill();
        }
      });
    }

    /* ── Estrellas fugaces ── */
    function manageShoots(t) {
      if (t - lastShoot > 3.2 + Math.random() * 3.8) {
        lastShoot = t;
        var fromLeft = Math.random() > 0.5;
        SHOOTS.push({
          x0: fromLeft ? W * 0.05 : W * (0.55 + Math.random() * 0.4),
          y0: Math.random() * H * 0.42,
          vx: (fromLeft ? 1 : -1) * (6 + Math.random() * 7),
          vy: 1.8 + Math.random() * 2.8,
          life: 0, max: 40,
          len: 90 + Math.random() * 110,
          hue: Math.random() > 0.55 ? '180,225,255' : '255,255,255',
        });
      }
      SHOOTS = SHOOTS.filter(function(s) {
        s.life++;
        var fr = s.life / s.max;
        var a  = fr < 0.22 ? fr / 0.22 : 1 - (fr - 0.22) / 0.78;
        var x  = s.x0 + s.vx * s.life, y = s.y0 + s.vy * s.life;
        ctx.save(); ctx.translate(x, y); ctx.rotate(Math.atan2(s.vy, s.vx));
        var g = ctx.createLinearGradient(-s.len, 0, 3, 0);
        g.addColorStop(0,    'rgba('+s.hue+',0)');
        g.addColorStop(0.80, 'rgba('+s.hue+',' + (a*0.55) + ')');
        g.addColorStop(1,    'rgba(255,255,255,' + a + ')');
        ctx.fillStyle = g; ctx.fillRect(-s.len, -0.9, s.len + 3, 1.8);
        ctx.beginPath(); ctx.arc(3, 0, 1.8, 0, 6.2832);
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')'; ctx.fill();
        ctx.restore();
        return s.life < s.max;
      });
    }

    /* ── Órbitas ── */
    function drawOrbits() {
      PLANETS.forEach(function(p) {
        ctx.beginPath();
        ctx.ellipse(CX, CY, p.orb, p.orb * TILT, 0, 0, 6.2832);
        ctx.strokeStyle = 'rgba(255,255,255,0.048)';
        ctx.lineWidth = 1; ctx.stroke();
      });
    }

    /* ── Calcular posiciones ── */
    function buildItems(t) {
      return PLANETS.map(function(p) {
        var an = p.phase + t * p.spd;
        var x  = CX + Math.cos(an) * p.orb;
        var y  = CY + Math.sin(an) * p.orb * TILT;
        p.trail.push({ x: x, y: y });
        if (p.trail.length > 48) p.trail.shift();
        return { p: p, x: x, y: y, a: an, behind: Math.sin(an) < 0 };
      });
    }

    /* ── Estela orbital ── */
    function drawTrail(it, alpha) {
      var p  = it.p;
      var nr = p.neon[0], ng = p.neon[1], nb = p.neon[2];
      p.trail.forEach(function(pt, ti) {
        var frac = ti / p.trail.length;
        var a    = frac * frac * alpha * 0.32;
        var sz   = p.sz * frac * 0.38;
        if (sz < 0.3 || a < 0.005) return;
        var tg = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, sz * 3);
        tg.addColorStop(0, 'rgba('+nr+','+ng+','+nb+','+a+')');
        tg.addColorStop(1, 'rgba('+nr+','+ng+','+nb+',0)');
        ctx.beginPath(); ctx.arc(pt.x, pt.y, sz * 3, 0, 6.2832);
        ctx.fillStyle = tg; ctx.fill();
      });
    }

    /* ── Sol ── */
    function drawSun(t) {
      /* Rayos — 12 brazos alternados largos/cortos */
      ctx.save(); ctx.translate(CX, CY); ctx.rotate(t * 0.14);
      for (var ri = 0; ri < 12; ri++) {
        var ra = (ri / 12) * 6.2832;
        var rl = (ri % 2 === 0 ? 30 : 22) + 8 * Math.sin(t * 2.2 + ri);
        ctx.beginPath();
        ctx.moveTo(Math.cos(ra) * 22, Math.sin(ra) * 22);
        ctx.lineTo(Math.cos(ra) * rl, Math.sin(ra) * rl);
        ctx.strokeStyle = 'rgba(255,210,55,' + (ri % 2 === 0 ? 0.28 : 0.14) + ')';
        ctx.lineWidth = ri % 2 === 0 ? 2.5 : 1.2; ctx.stroke();
      }
      ctx.restore();

      /* Halo exterior pulsante */
      var hr = 68 + 9 * Math.sin(t * 1.1);
      var hg = ctx.createRadialGradient(CX, CY, 18, CX, CY, hr);
      hg.addColorStop(0,   'rgba(255,210,60,0.28)');
      hg.addColorStop(0.55,'rgba(255,130,0,0.11)');
      hg.addColorStop(1,   'rgba(255,50,0,0)');
      ctx.beginPath(); ctx.arc(CX, CY, hr, 0, 6.2832); ctx.fillStyle = hg; ctx.fill();

      /* Neón solar cálido */
      var cg = ctx.createRadialGradient(CX, CY, 14, CX, CY, 38 + 4 * Math.sin(t * 2.3));
      cg.addColorStop(0,   'rgba(255,245,180,0.58)');
      cg.addColorStop(0.65,'rgba(255,180,0,0.22)');
      cg.addColorStop(1,   'rgba(255,80,0,0)');
      ctx.beginPath(); ctx.arc(CX, CY, 38, 0, 6.2832); ctx.fillStyle = cg; ctx.fill();

      /* Núcleo */
      var sg = ctx.createRadialGradient(CX - 6, CY - 6, 0, CX, CY, 22);
      sg.addColorStop(0,    'rgba(255,255,248,1)');
      sg.addColorStop(0.30, 'rgba(255,242,110,0.98)');
      sg.addColorStop(0.70, 'rgba(255,155,0,0.72)');
      sg.addColorStop(1,    'rgba(220,65,0,0.22)');
      ctx.beginPath(); ctx.arc(CX, CY, 22, 0, 6.2832); ctx.fillStyle = sg; ctx.fill();

      /* Destello especular */
      var sg2 = ctx.createRadialGradient(CX - 7, CY - 7, 0, CX - 7, CY - 7, 7);
      sg2.addColorStop(0, 'rgba(255,255,255,0.88)');
      sg2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(CX - 7, CY - 7, 7, 0, 6.2832); ctx.fillStyle = sg2; ctx.fill();
    }

    /* ── Planeta ── */
    function drawPlanet(it, alpha) {
      var p = it.p, x = it.x, y = it.y;
      var sc2 = it.behind ? 0.83 : 1.0;
      var sz  = p.sz * sc2, a = alpha;
      var r   = p.col[0],  g = p.col[1],  b = p.col[2];
      var nr  = p.neon[0], ng = p.neon[1], nb = p.neon[2];

      /* Saturno: anillos (parte trasera) */
      if (p.rings) {
        ctx.save(); ctx.translate(x, y); ctx.scale(1, TILT * 0.70);
        ctx.beginPath(); ctx.ellipse(0, 0, sz*2.8, sz*0.78, 0, 0, 6.2832);
        ctx.strokeStyle = 'rgba('+nr+','+ng+','+nb+','+(a*0.42)+')';
        ctx.lineWidth = 7; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0, 0, sz*2.1, sz*0.55, 0, 0, 6.2832);
        ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+(a*0.28)+')';
        ctx.lineWidth = 3.5; ctx.stroke();
        ctx.restore();
      }

      /* NEÓN CAPA 1 — gran halo exterior (bloom) */
      var g1 = ctx.createRadialGradient(x, y, sz*0.4, x, y, sz*7);
      g1.addColorStop(0,   'rgba('+nr+','+ng+','+nb+','+(a*0.16)+')');
      g1.addColorStop(0.45,'rgba('+nr+','+ng+','+nb+','+(a*0.06)+')');
      g1.addColorStop(1,   'rgba('+nr+','+ng+','+nb+',0)');
      ctx.beginPath(); ctx.arc(x, y, sz*7, 0, 6.2832); ctx.fillStyle = g1; ctx.fill();

      /* NEÓN CAPA 2 — corona media */
      var g2 = ctx.createRadialGradient(x, y, sz*0.2, x, y, sz*3.4);
      g2.addColorStop(0,   'rgba('+nr+','+ng+','+nb+','+(a*0.58)+')');
      g2.addColorStop(0.55,'rgba('+nr+','+ng+','+nb+','+(a*0.22)+')');
      g2.addColorStop(1,   'rgba('+nr+','+ng+','+nb+',0)');
      ctx.beginPath(); ctx.arc(x, y, sz*3.4, 0, 6.2832); ctx.fillStyle = g2; ctx.fill();

      /* NEÓN CAPA 3 — anillo íntimo (limbo brillante) */
      var g3 = ctx.createRadialGradient(x, y, sz*0.75, x, y, sz*1.55);
      g3.addColorStop(0,   'rgba('+nr+','+ng+','+nb+','+(a*0.78)+')');
      g3.addColorStop(1,   'rgba('+nr+','+ng+','+nb+',0)');
      ctx.beginPath(); ctx.arc(x, y, sz*1.55, 0, 6.2832); ctx.fillStyle = g3; ctx.fill();

      /* Cuerpo 3D */
      var lr = Math.min(r+92,255), lg = Math.min(g+92,255), lb = Math.min(b+92,255);
      var dr = Math.floor(r*0.28), dg = Math.floor(g*0.28), db = Math.floor(b*0.28);
      var pg = ctx.createRadialGradient(x-sz*0.40, y-sz*0.40, sz*0.03, x, y, sz*1.08);
      pg.addColorStop(0,    'rgba('+lr+','+lg+','+lb+','+a+')');
      pg.addColorStop(0.52, 'rgba('+r+','+g+','+b+','+a+')');
      pg.addColorStop(1,    'rgba('+dr+','+dg+','+db+','+a+')');
      ctx.beginPath(); ctx.arc(x, y, sz, 0, 6.2832); ctx.fillStyle = pg; ctx.fill();

      /* Bandas de Júpiter */
      if (p.bands) {
        ctx.save(); ctx.beginPath(); ctx.arc(x, y, sz, 0, 6.2832); ctx.clip();
        var offs  = [-0.60,-0.26,0.08,0.42];
        var bcols = ['rgba(145,80,28,','rgba(205,148,72,','rgba(115,58,20,','rgba(188,128,52,'];
        offs.forEach(function(off, bi) {
          ctx.fillStyle = bcols[bi] + (a*0.30) + ')';
          ctx.fillRect(x-sz, y+off*sz, sz*2, sz*0.28);
        });
        ctx.restore();
      }

      /* Destello especular */
      var hx = x - sz*0.36, hy = y - sz*0.36, hr = sz*0.40;
      var hg2 = ctx.createRadialGradient(hx, hy, 0, hx, hy, hr);
      hg2.addColorStop(0, 'rgba(255,255,255,'+(a*0.68)+')');
      hg2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, 6.2832); ctx.fillStyle = hg2; ctx.fill();

      /* Luna de la Tierra */
      if (p.moon) {
        var ma = it.a * 7.8, mr = sz * 2.45;
        var mx = x + Math.cos(ma) * mr, my = y + Math.sin(ma) * mr * TILT;
        /* Glow azul-plateado */
        var mg = ctx.createRadialGradient(mx, my, 0, mx, my, 7);
        mg.addColorStop(0, 'rgba(170,205,240,'+(a*0.55)+')');
        mg.addColorStop(1, 'rgba(170,205,240,0)');
        ctx.beginPath(); ctx.arc(mx, my, 7, 0, 6.2832); ctx.fillStyle = mg; ctx.fill();
        ctx.beginPath(); ctx.arc(mx, my, 3, 0, 6.2832);
        ctx.fillStyle = 'rgba(200,220,240,'+(a*0.94)+')'; ctx.fill();
      }
    }

    requestAnimationFrame(frame);
  })();


  /* ── Letras animadas del título ── */
  (function buildTitle() {
    var container = document.getElementById('spLetters');
    if (!container) return;
    var text  = ['L','u','k','i','B','o','o','k','s'];
    var isOr  = [false,false,false,false,true,true,true,true,true];
    var BASE_DELAY = 820; /* ms desde carga */
    text.forEach(function (ch, i) {
      var span = document.createElement('span');
      span.className = 'sp-letter';
      if (isOr[i]) span.style.color = '#FF9940'; /* orange override sobre gradient */
      span.style.animationDelay = (BASE_DELAY + i * 65) + 'ms';
      span.textContent = ch;
      container.appendChild(span);
    });
  })();

  /* ── Tagline palabra por palabra ── */
  (function buildTagline() {
    var el = document.getElementById('spTagline');
    if (!el) return;
    var words = ['Donde','cada','libro','abre','un','mundo','de','posibilidades'];
    var BASE  = 1400;
    words.forEach(function (w, i) {
      var span = document.createElement('span');
      span.className = 'sp-word';
      span.style.animationDelay = (BASE + i * 90) + 'ms';
      span.textContent = w + (i < words.length - 1 ? '\u00A0' : '');
      el.appendChild(span);
    });
  })();

  /* ── Secuencia de reveals ── */
  function revealEl(id, delay) {
    setTimeout(function () {
      var el = document.getElementById(id);
      if (el) el.classList.add('reveal');
    }, delay);
  }

  revealEl('spTitleWrap',  600);
  revealEl('spProgWrap',  1200);

  /* ── Barra de progreso suave con rAF ── */
  var progStart = null;
  var PROG_DUR  = 2600;

  setTimeout(function () {
    var fill = document.getElementById('spFill');
    function progFrame(now) {
      if (!progStart) progStart = now;
      var raw = (now - progStart) / PROG_DUR;
      /* Ease: arranca rápido, se desacelera al final */
      var eased = raw < .8
        ? raw * 1.1
        : .88 + (raw - .8) * .6;
      var pct = Math.min(eased * 100, 100);
      if (fill) fill.style.width = pct + '%';
      if (raw < 1) requestAnimationFrame(progFrame);
    }
    requestAnimationFrame(progFrame);
  }, 1550);

  /* ────────────────────────────────────────────────────────────
     TRANSICIÓN SPLASH → LOGIN
     Fade + blur out / fade + slide in
  ──────────────────────────────────────────────────────────── */
  var transitioned = false;

  function doTransition() {
    if (transitioned) return;
    transitioned = true;

    var splash = document.getElementById('splash');
    var login  = document.getElementById('loginPage');

    /* 1. Splash exit */
    splash.classList.add('exit');

    /* 2. Login aparece con ligero delay para que se sienta como crossfade */
    setTimeout(function () {
      login.classList.add('show');
    }, 100);

    /* 3. Eliminar splash del DOM para liberar memoria */
    setTimeout(function () {
      if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      document.body.classList.add('ready');
    }, 850);
  }

  /* Trigger: 3.2s o cuando la página ya cargó completamente */
  var SPLASH_DURATION = 3200;
  var splashTimer = setTimeout(doTransition, SPLASH_DURATION);

  window.addEventListener('load', function () {
    /* Si la página carga muy rápido, esperar mínimo 2.8s para que se vea el splash */
    var elapsed = performance.now() - t0;
    var remaining = Math.max(2800 - elapsed, 0);
    clearTimeout(splashTimer);
    splashTimer = setTimeout(doTransition, remaining);
  });

  /* ────────────────────────────────────────────────────────────
     CONFIG DINÁMICA — logo y favicon desde API
  ──────────────────────────────────────────────────────────── */
  fetch(BASE + '/config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      if (!cfg) return;

      if (cfg.logo) {
        var box = document.getElementById('lpLogoBox');
        if (box) {
          var inner = box.querySelector('.lp-logo-inner');
          if (inner) inner.innerHTML = '<img src="' + cfg.logo + '" alt="Logo" style="width:100%;height:100%;object-fit:cover;display:block">';
        }
      }

      if (cfg.favicon) {
        var fav = document.getElementById('dynFavicon');
        if (fav) fav.href = cfg.favicon;
      }
    })
    .catch(function () { /* logo local se mantiene */ });

  /* ────────────────────────────────────────────────────────────
     TOGGLE CONTRASEÑA
  ──────────────────────────────────────────────────────────── */
  var toggleBtn  = document.getElementById('togglePass');
  var passInput  = document.getElementById('inputPass');
  var passShown  = false;

  toggleBtn.addEventListener('click', function () {
    passShown      = !passShown;
    passInput.type = passShown ? 'text' : 'password';
    toggleBtn.innerHTML = passShown ? '&#128584;' : '&#128065;';
    toggleBtn.setAttribute('aria-label',
      passShown ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  /* ────────────────────────────────────────────────────────────
     FORMULARIO DE LOGIN
  ──────────────────────────────────────────────────────────── */
  var form    = document.getElementById('loginForm');
  var errBox  = document.getElementById('errBox');
  var btnEl   = document.getElementById('btnLogin');
  var userInp = document.getElementById('inputUser');

  /* ── Bloqueo por intentos fallidos ── */
  var MAX_ATTEMPTS  = 5;
  var LOCK_DURATION = 10 * 60 * 1000; /* 10 minutos en ms */
  var STORE_KEY     = 'biblio_login_lock';
  var countdownTimer = null;

  function getLockData() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
  }
  function saveLockData(d) {
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }
  function clearLockData() {
    localStorage.removeItem(STORE_KEY);
  }

  function isLocked() {
    var d = getLockData();
    if (!d.lockedUntil) return false;
    if (Date.now() < d.lockedUntil) return true;
    clearLockData();
    return false;
  }

  function remainingMs() {
    var d = getLockData();
    return d.lockedUntil ? Math.max(0, d.lockedUntil - Date.now()) : 0;
  }

  function registerFail() {
    var d = getLockData();
    d.attempts = (d.attempts || 0) + 1;
    if (d.attempts >= MAX_ATTEMPTS) {
      d.lockedUntil = Date.now() + LOCK_DURATION;
    }
    saveLockData(d);
    return d.attempts;
  }

  function fmtTime(ms) {
    var totalSec = Math.ceil(ms / 1000);
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function startLockCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    function tick() {
      var rem = remainingMs();
      if (rem <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        errBox.classList.remove('show');
        setFormLocked(false);
        clearLockData();
        return;
      }
      errBox.textContent = 'Demasiados intentos fallidos. Espere ' + fmtTime(rem) + ' para intentarlo de nuevo.';
      errBox.classList.add('show');
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function setFormLocked(locked) {
    userInp.disabled  = locked;
    passInput.disabled = locked;
    btnEl.disabled    = locked;
    if (locked) {
      btnEl.innerHTML = '&#128274; Acceso bloqueado';
    } else {
      btnEl.innerHTML = 'Iniciar sesi\u00F3n';
    }
  }

  /* Verificar bloqueo al cargar */
  if (isLocked()) {
    setFormLocked(true);
    startLockCountdown();
  }

  /* Limpiar error al escribir */
  [userInp, passInput].forEach(function (inp) {
    inp.addEventListener('input', function () {
      if (!isLocked()) {
        errBox.classList.remove('show');
        inp.classList.remove('shake');
      }
    });
  });

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');

    /* Shake en ambos inputs: forzar reflow para reiniciar animación */
    [userInp, passInput].forEach(function (inp) {
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
    });
    setTimeout(function () {
      [userInp, passInput].forEach(function (i) { i.classList.remove('shake'); });
    }, 500);
  }

  function setLoading(on) {
    btnEl.disabled = on;
    btnEl.innerHTML = on
      ? '<span class="btn-spinner"></span>Verificando\u2026'
      : 'Iniciar sesi\u00F3n';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errBox.classList.remove('show');

    if (isLocked()) {
      startLockCountdown();
      return;
    }

    var usuario  = userInp.value.trim();
    var password = passInput.value;

    if (!usuario || !password) {
      showErr('Ingrese usuario y contraseña para continuar');
      return;
    }

    setLoading(true);

    fetch(BASE + '/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ usuario: usuario, password: password })
    })
    .then(function (res) {
      return res.json().then(function (d) { return { ok: res.ok, d: d }; });
    })
    .then(function (r) {
      if (!r.ok) {
        var attempts = registerFail();
        if (isLocked()) {
          setFormLocked(true);
          startLockCountdown();
        } else {
          var remaining = MAX_ATTEMPTS - attempts;
          showErr((r.d.error || 'Credenciales incorrectas') +
            (remaining > 0 ? ' (' + remaining + ' intento' + (remaining === 1 ? '' : 's') + ' restante' + (remaining === 1 ? '' : 's') + ')' : ''));
          setLoading(false);
        }
        return;
      }
      /* Éxito: limpiar conteo */
      clearLockData();
      btnEl.innerHTML = '&#10003; Acceso concedido';
      btnEl.classList.add('success');
      btnEl.disabled  = true;
      localStorage.setItem('biblio_token', r.d.token);
      localStorage.setItem('biblio_user',  JSON.stringify(r.d.user));
      setTimeout(function () { location.href = 'index.html'; }, 680);
    })
    .catch(function () {
      showErr('Error de conexión. Verifique que el servidor esté activo.');
      setLoading(false);
    });
  });

  /* ────────────────────────────────────────────────────────────
     LED ARCOÍRIS — colores animados alrededor del logo
  ──────────────────────────────────────────────────────────── */
  (function ledRainbow() {
    var box = document.querySelector('.lp-logo-box');
    if (!box) return;

    var ledStart = performance.now();

    function ledFrame(now) {
      var t = (now - ledStart) * .001;

      /* Hue principal girando despacio (vuelta completa en ~9s) */
      var hue1 = (t * 40) % 360;
      /* Segundo color con offset fijo para dar profundidad */
      var hue2 = (hue1 + 50) % 360;
      /* Tercer color para el ambiente */
      var hue3 = (hue1 + 110) % 360;

      /* Pulso de intensidad con dos frecuencias superpuestas */
      var pulse = (Math.sin(t * 2.2) * .5 + .5) * .4
                + (Math.sin(t * 3.7) * .5 + .5) * .6;

      var strip  = .88 + pulse * .12;   /* LED strip: 88–100% */
      var glow1  = .65 + pulse * .25;   /* glow inmediato */
      var glow2  = .35 + pulse * .20;   /* spread medio */
      var glow3  = .14 + pulse * .12;   /* ambiente */

      box.style.boxShadow = [
        '0 0 0 2.5px hsla(' + hue1 + ',100%,65%,' + strip  + ')',
        '0 0 10px 3px  hsla(' + hue1 + ',100%,60%,' + glow1  + ')',
        '0 0 24px 7px  hsla(' + hue2 + ',100%,55%,' + glow2  + ')',
        '0 0 50px 12px hsla(' + hue3 + ',100%,50%,' + glow3  + ')',
        '0 10px 32px rgba(0,0,0,.52)'
      ].join(', ');

      requestAnimationFrame(ledFrame);
    }

    requestAnimationFrame(ledFrame);
  })();

})();
</script>
